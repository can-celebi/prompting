const VARIANTS = [
  { key: "v",       label: "Verbatim",        tag: "v",  cssClass: "col-h-v" },
  { key: "v_ex",    label: "Verbose",         tag: "+50–275% words", cssClass: "col-h-x" },
  { key: "v_noise", label: "Noise",           tag: "matched length, irrelevant", cssClass: "col-h-n" }
];

let state = { task: "l1", sec: "cls" };

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render() {
  const container = document.getElementById("cols");
  container.innerHTML = "";
  const taskData = SECTIONS[state.task] || {};
  const secData = taskData[state.sec];

  if (!secData) {
    container.innerHTML = '<div style="grid-column:1/-1;padding:30px;text-align:center;color:#aaa;font-style:italic;">Not available for this task / section combination.</div>';
    return;
  }

  VARIANTS.forEach(v => {
    const txt = secData[v.key];
    const card = document.createElement("div");
    card.className = "col";
    card.innerHTML = `
      <div class="col-header ${v.cssClass}">${v.label}<span class="col-tag">— ${v.tag}</span></div>
      <div class="col-body">${txt ? escapeHtml(txt) : '<em style="color:#999">(none)</em>'}</div>`;
    container.appendChild(card);
  });

  // Disable theory tab when not present (P-tasks)
  const tabTheory = document.querySelector('.tab.section[data-sec="theory"]');
  const hasTheory = !!(taskData.theory);
  tabTheory.classList.toggle("disabled", !hasTheory);
}

function bind(selector, key) {
  document.querySelectorAll(selector).forEach(b => {
    b.addEventListener("click", () => {
      if (b.classList.contains("disabled")) return;
      document.querySelectorAll(selector).forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      state[key] = b.dataset[key];
      render();
    });
  });
}

bind('.controls .tab[data-task]', 'task');
bind('.controls .tab.section', 'sec');
render();
</script>
