<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Example items — Much Ado about Prompting</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #fafaf7;
    color: #1c1c1c;
    padding: 24px 28px 56px;
    line-height: 1.5;
  }
  header { margin-bottom: 22px; border-bottom: 1px solid #e5e5e0; padding-bottom: 16px; }
  h1 { font-size: 1.4em; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; }
  .sub { color: #777; font-size: 0.9em; font-style: italic; }
  .controls { display: flex; gap: 6px; margin-top: 18px; flex-wrap: wrap; }
  .tab {
    padding: 6px 14px; border: 1px solid #d0cfc7; background: #fff; border-radius: 6px;
    cursor: pointer; font-size: 0.88em; color: #555; transition: all 0.15s;
  }
  .tab:hover { border-color: #1a3a5f; color: #1a3a5f; }
  .tab.active { background: #1a3a5f; color: #fff; border-color: #1a3a5f; font-weight: 500; }
  .items {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 22px;
  }
  @media (min-width: 900px) {
    .items { grid-template-columns: 1fr 1fr; }
  }
  .card {
    background: #fff;
    border: 1px solid #e5e5e0;
    border-left: 4px solid #d0cfc7;
    border-radius: 6px;
    overflow: hidden;
  }
  .card.easy { border-left-color: #2e7a48; }
  .card.hard { border-left-color: #b85a4a; }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px; background: #f6f4ee; border-bottom: 1px solid #e5e5e0;
  }
  .card-id { font-family: "SFMono-Regular", monospace; font-size: 0.78em; color: #888; }
  .badge { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 12px; font-weight: 600; }
  .badge.easy { background: #e1f5e8; color: #2e7a48; }
  .badge.hard { background: #fde6e0; color: #b85a4a; }
  .text {
    padding: 12px 16px;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 0.78em;
    line-height: 1.55;
    white-space: pre-wrap;
    color: #333;
    background: #fcfcfa;
  }
  .labels {
    padding: 10px 16px;
    background: #fff;
    border-top: 1px dashed #e5e5e0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    font-size: 0.84em;
  }
  .lab { display: flex; align-items: baseline; gap: 8px; }
  .lab-key {
    font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.05em;
    color: #888; min-width: 84px;
  }
  .lab-val {
    font-family: "SFMono-Regular", monospace; font-weight: 600;
  }
  .lab-val.match  { color: #2e7a48; }
  .lab-val.miss   { color: #b85a4a; }
  footer {
    margin-top: 36px; padding-top: 16px; border-top: 1px solid #e5e5e0;
    font-size: 0.78em; color: #999; text-align: center;
  }
  footer a { color: #777; text-decoration: none; }
  footer a:hover { color: #1a3a5f; }
</style>
</head>
<body>

<header>
  <h1>Example items &middot; GPT 5.4 in action</h1>
  <div class="sub">Real subject text from each task with GPT 5.4's classification (verbatim prompt + worked examples). Easy = always correct; hard = consistently wrong.</div>
  <div class="controls" id="task-tabs">
    <button class="tab active" data-task="p2">Promise</button>
    <button class="tab" data-task="l1">Level-k I</button>
    <button class="tab" data-task="l2">Level-k II</button>
  </div>
</header>

<div class="items" id="items"></div>

<footer>
  <a href="index.html">&larr; back to companion materials</a>
</footer>

function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderLabels(it, task) {
  if (task === "l1") {
    const ok = String(it.pred) === String(it.human);
    return `
      <div class="lab"><span class="lab-key">Human</span><span class="lab-val">${escapeHtml(it.human)}</span></div>
      <div class="lab"><span class="lab-key">GPT 5.4</span><span class="lab-val ${ok?'match':'miss'}">${escapeHtml(it.pred)}</span></div>`;
  }
  if (task === "l2") {
    const p = parseInt(it.pred);
    const [lo, hi] = it.human.split("--").map(Number);
    const ok = !isNaN(p) && p>=lo && p<=hi;
    return `
      <div class="lab"><span class="lab-key">Human range</span><span class="lab-val">${escapeHtml(it.human)}</span></div>
      <div class="lab"><span class="lab-key">GPT 5.4</span><span class="lab-val ${ok?'match':'miss'}">${escapeHtml(it.pred)}</span></div>`;
  }
  // p2
  const fmt = obj => Object.entries(obj).map(([k,v]) => `${k}=${v}`).join(", ");
  const correct = (gp, h1, h2) => Object.keys(gp).every(k =>
    gp[k]===h1[k] || gp[k]===(h2[k]||"na").toLowerCase().replace("na","0"));
  const ok = correct(it.pred, it.human, it.human2 || {});
  return `
    <div class="lab"><span class="lab-key">Rater 1</span><span class="lab-val">${escapeHtml(fmt(it.human))}</span></div>
    <div class="lab"><span class="lab-key">Rater 2</span><span class="lab-val">${escapeHtml(fmt(it.human2 || {}))}</span></div>
    <div class="lab"><span class="lab-key">GPT 5.4</span><span class="lab-val ${ok?'match':'miss'}">${escapeHtml(fmt(it.pred))}</span></div>`;
}

function render(task) {
  const items = PICKS[task] || [];
  const c = document.getElementById("items");
  c.innerHTML = "";
  items.forEach(it => {
    const card = document.createElement("div");
    card.className = "card " + it.tag;
    card.innerHTML = `
      <div class="card-head">
        <span class="card-id">${escapeHtml(it.id)}</span>
        <span class="badge ${it.tag}">${it.tag}</span>
      </div>
      <div class="text">${escapeHtml(it.text)}</div>
      <div class="labels">${renderLabels(it, task)}</div>`;
    c.appendChild(card);
  });
}

document.getElementById("task-tabs").addEventListener("click", e => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll("#task-tabs .tab").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  render(e.target.dataset.task);
});

render("p2");
