<script>
const DATA   = {"p2": {"cls": {"v": "Code a participant's message (including his/her entire text in the conversation) as **promise** (1) if at least one of the following conditions is satisfied:\n\n- The writer indicates in the message he/she would take a certain course of action.\n- The message gives the other participants reasons to believe or expect that the writer of the message would take a certain course of action.\n\nCode a message as **empty talk** (0) if the message does not satisfy any of the above conditions.\n\n**Important**: Capture what had been said rather than why it was said or what effect it had.\n\nProvide one classification per player.", "s": "- Classify the message as promise (1) or empty talk (0)."}, "exp": {"v": "- In this experiment, three participants are randomly matched for a group investment task.\n- The experiment consists of multiple rounds. Each round, participants are matched with a different group.\n- Each participant starts with 200 pence (£2).\n- Participants can invest between 0-200 in a group project.\n- Participants can keep any money that they don't invest. The total amount invested by all 3 group members is doubled.\n- Then it is shared out equally.\n- So, for every 100 pence invested by anyone, each person in the group gets 66 pence back.\n- Before choosing how much to invest, participants can chat with their group members.", "c1": "- In this experiment, three participants are randomly matched for a group investment task over multiple rounds.\n- Each participant starts with 200 pence and can invest between 0-200 in a group project.\n- The total amount invested by all 3 group members is doubled and shared out equally.\n- Before choosing how much to invest, participants can chat with their group members.", "c3": "- Three participants each start with 200 pence and can invest in a group project over multiple rounds.\n- The total investment is doubled and shared equally.\n- Participants can chat before investing."}}, "l1": {"cls": {"v": "Classify the participant's level of strategic reasoning using the guidance below. Subjects do not necessarily describe every step of their thinking; therefore, it may not always be obvious to decide which level they are. In many comments, any indications of a level of thinking may be partial or implicit, you should then indicate the most likely level of reasoning of the player.\n\n## Level 0\n- Chooses randomly, without justification or through some justification completely unrelated to the task.\n- Might not have understood the game or shows no interest in the game or in thinking about it.\n\n**Note**: Comments such as \"It is obviously blue\" or \"Play red, trust me!\" should not be considered as level-0 thinking as these comments to some extent signal some level of understanding/interest of the task. Such comments are likely to be level-1 comments.\n\n## Level 1\n- Always follows his own signal.\n- The subject may argue in favor of playing his own signal through some probability argument.\n\n**Note**: The key idea in defining a level-1 player is to identify some thinking process that signals the subject's interest/understanding of the task and the private signal. Furthermore, it is important that the subject does not offer any argument acknowledging the potential votes of the other teams and how to vote accordingly (i.e. adjusting the strategy given what others are expected to do).\n\n## Level 2\n- Assume that all other players almost always follow their signal (i.e. she assumes almost all the other players are level-1 while an epsilon portion of them are level-0).\n- Player does offer an argument acknowledging the potential votes of the other teams and how to vote accordingly (i.e. a best response given others are most likely playing their signal).\n- If you identify any comment that indicates that the subject assumes (or considers the case) where the other players in her group play their signal, you should consider the possibility that the subject is a level-2 player.\n\n**Note**: In order to discern the two types, you should look for more than any trivial arguments such as the ones given under level-1. There may be cases where the message starts as a level-1 argument and then as the subjects elaborates on her reasoning, she starts considering the strategy of the other teams and justify her decision accordingly. In such cases, this message should be considered as level-2. The acknowledgment of other teams' voting strategy may not always be obvious or may be worded differently such as \"hurting the other's decision\" or \"not being helpful\".\n\n## Level 3\n- Assumes that almost all other subjects are level-2 players (partially degenerate beliefs).\n- The reasoning in a level-3 player message will have similarities with a level-1 player message but it will have additional arguments indicating that she assumes others are level-2 players.\n\n**Note**: Level-3 players are likely to follow their signal like a level-1 player yet they will argue to do so through a much more intricate argument (unlike a level-1 player merely stating probabilities to argue her action). Level-3 players are rare.", "s": "- Classify the player's level of strategic thinking as 0, 1, 2 or 3."}, "exp": {"v": "- A single experimental session consists of 4 parts and every part consists of 2 periods. In every part, every subject is randomly paired with another one to form a team.\n- Depending on the treatment, every team then is randomly matched with 2 or 5 other teams to form a voting group.\n- Every group will be assigned to a blue or red urn and every team in the group will draw a ball from their assigned urn. The blue urn contains twice more blue balls than red balls. The red urn contains twice more red balls than blue balls.\n- One treatment variable is the group size: in parts 1 and 3 the groups consist of 3 teams, in parts 2 and 4 they consist of 6 teams, and accordingly the urns contain 3 or 6 balls.\n- The other treatment variable is the draw mechanism: depending on the session, the balls will be drawn from the urn with or without replacement.\n- The goal of every group is to correctly state the color of the urn they are assigned to. Every team submits a vote (either red or blue) and if every team in the group votes for red then the group's decision will be red, otherwise it will be blue.\n- Every subject in a team observes the team's drawn ball and then makes a decision on the color of the urn. Then, they send a message to their team member explaining why they should vote for the suggested color.\n- The team members receive the suggestions and the message of their teammates, and make their final decision on their own. Either of the team member's decision is equally likely to be chosen as the team's final voting decision.", "c1": "- Every subject is randomly paired with another one to form a team. Every team is randomly matched with other teams to form a voting group.\n- Every group will be assigned to a blue or red urn and every team in the group will draw a ball from their assigned urn. The blue urn contains twice more blue balls than red balls. The red urn contains twice more red balls than blue balls.\n- The groups consist of either 3 or 6 teams. The balls will be drawn from the urn with or without replacement.\n- The goal of every group is to correctly state the color of the urn they are assigned to. Every team submits a vote (either red or blue) and if every team in the group votes for red then the group's decision will be red, otherwise it will be blue.\n- Every subject in a team observes the team's drawn ball and sends a message to their team member explaining why they should vote for the suggested color.", "c2": "- Subjects form teams of two. Teams are grouped into voting groups of 3 or 6 teams.\n- Every group is assigned to a blue or red urn. The blue urn contains twice more blue balls than red balls, and vice versa. Every team draws a ball, with or without replacement.\n- The goal is to correctly state the color of the urn. Every team submits a vote (red or blue). If every team votes red, the group decision is red; otherwise blue.\n- Each subject sends a message to their team member explaining their suggested vote."}, "theory": {"v": "- The level-k model of bounded rationality assumes that players only think through a certain number (k) of best responses. The model has four main ingredients:\n- Population distribution: This distribution reflects the proportion of types with a certain level k ∈ N0 = {0, 1, 2, 3, 4, 5, ...}.\n- Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions are random to the game and distributed randomly over the action space. In our case, the action space is A = {Red, Blue} where Red and Blue represent the voting choice of the player. Note that, our model does not incorporate salience by assuming higher probabilities in the level-0 distributions for the action that is salient due the signal received (i.e. if a blue ball is received and the player is playing random, the player, due to the availability of the blue signal, will chose to vote blue)\n- Level-0 belief: In the model, the best responses of players with level k > 0 are anchored in what they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0 distribution. For best responding, all that matters is the expected payoff from choosing an action from the action space A = {Red, Blue}.\n- Population belief: Players do not expect other players to be of the same or a higher level of reasoning. For a level-k player, the population belief is therefore defined on the set of levels strictly below k. It follows that level-0 players have no defined belief, level-1 players have a trivial belief with full probability mass on {0} (i.e. the belief that everyone else is level-0), level-2 players have a well defined belief on {{0}, {1}}. From level 3 higher order beliefs are relevant as level-3 players have to form a belief about level-2's beliefs.\n- We consider a game with n players (jurors in the voting context). The game starts by nature choosing a state of the world S in Ω = {Red, Blue} with probability r and 1 − r respectively. The players do not observe the state, but each acquires a private signal s about the realized state of the world. If the true state is Blue, then each player observes an independent (or geometrically dependent) Bernoulli random variable (the private signal) which is blue with probability p and red with probability 1 − p (and conversely for when the true state is Red).\n- After observing their private signals, players chose an action a (a vote) from the action space A = {Red, Blue}. Given the votes of the players, 1 ≤ k* ≤ n represents the number of votes needed for Red to be chosen for the aggregate decision. If k* many or more players vote for Red, then the group decision is Red otherwise it is Blue.\n- The utility of jury j when she takes action a with certainty given her signal is s and given the state is S is defined as uj(σj(s) = a, S). Given any signal s, the utility u : A x Ω → R for jury j is further defined by uj(σj(s) = blue, Blue) = uj(σj(s) = red, Red) = 0, uj(σj(s) = red, Blue) = −q and uj(σj(s) = blue, Red) = −(1 − q), where 0 < q < 1.\n- In all our experiments, we used k* = n (i.e., the unanimity voting rule), r = 0.5, q = 0.5 and p = 2/3. Treatments vary in the number of players n between 3 and 6.\n- Under the experimental set-up, the model provides the prototypical behavior of the subjects given their level as follows:\n- n = 3 or n = 6 with replacement: blue observed → level-1 votes blue, level-2 votes red. Red observed → both vote red.\n- n = 3 without replacement: blue observed → level-1 votes blue, level-2 votes red. Red observed → level-1 votes red, level-2 votes red or blue. (Voting red is strictly preferred under assumption that level-2 assumes some small probability of level-0 players)\n- n = 6 without replacement: blue observed → level-1 votes blue, level-2 votes red or blue. (Voting blue is strictly preferred under assumption of some level-0 players, not level-1) Red observed → level-1 votes red, level-2 votes red or blue. (Voting red is strictly preferred under assumption of some level-0 players)", "c1": "- The level-k model of bounded rationality assumes that players only think through a certain number (k) of best responses. The model has four main ingredients:\n- Population distribution: This distribution reflects the proportion of types with a certain level k.\n- Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions are random to the game and distributed randomly over the action space. In our case, the action space is A = {Red, Blue}. Note that, our model does not incorporate salience by assuming higher probabilities in the level-0 distributions for the action that is salient due the signal received (i.e. if a blue ball is received and the player is playing random, the player, due to the availability of the blue signal, will chose to vote blue)\n- Level-0 belief: In the model, the best responses of players with level k > 0 are anchored in what they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0 distribution.\n- Population belief: Players do not expect other players to be of the same or a higher level of reasoning. For a level-k player, the population belief is therefore defined on the set of levels strictly below k. It follows that level-0 players have no defined belief, level-1 players have a trivial belief with full probability mass on {0}, level-2 players have a well defined belief on {{0}, {1}}. From level 3 higher order beliefs are relevant as level-3 players have to form a belief about level-2's beliefs.\n- In all our experiments, we used k* = n (i.e., the unanimity voting rule), r = 0.5, q = 0.5 and p = 2/3. Treatments vary in the number of players n between 3 and 6.\n- n = 3 or n = 6 with replacement: blue observed → level-1 votes blue, level-2 votes red. Red observed → both vote red.\n- n = 3 without replacement: blue observed → level-1 votes blue, level-2 votes red. Red observed → level-1 votes red, level-2 votes red or blue.\n- n = 6 without replacement: blue observed → level-1 votes blue, level-2 votes red or blue. Red observed → level-1 votes red, level-2 votes red or blue.", "c2": "- The level-k model assumes players think through k best responses. Four ingredients:\n- Population distribution reflects the proportion of types with a certain level k.\n- Level-0 distribution: a level-0 player does not best respond; actions are random over A = {Red, Blue}. The model does not incorporate salience in the level-0 distribution (a blue signal may bias random play toward blue).\n- Level-0 belief: players with k > 0 anchor best responses on what they believe level-0 players play. Their level-0 belief might not be consistent with the level-0 distribution.\n- Population belief: players do not expect others to be of the same or higher level. Level-0 has no defined belief, level-1 believes all are level-0, level-2 has beliefs over {0, 1}. Level-3 must form beliefs about level-2's beliefs.\n- Optimal strategies: with replacement, level-1 follows signal, level-2 always votes red. Without replacement, level-2 may vote red or blue depending on group size and level-0 assumptions."}}, "l2": {"cls": {"v": "Classify the participant's level of strategic reasoning using the guidance below.\n\n## Level 0\n- The player does not exhibit any strategic reasoning whatsoever.\n- Different versions of this might be randomly chosen or purely guessed actions, misunderstanding of the game structure or other non-strategic 'reasons' for picking a location, e.g. by taste or salience.\n- It is important that no best-responding to the other's play occurs. There could be considerations of what others might play, but without best responding to it.\n\n## Level 1\n- This player best responds to some belief about the other teams' action.\n- However, he does not realise that others will be strategic as well.\n\n## Level 2\n- This player not only shows the basic strategic consideration of playing best response (matching/mismatching), but also realises that other players best respond as well according to the belief they entertain.\n- A level-2 player clearly contemplates how the other player might best respond to his frame. The player plays a best response to this hypothesised consideration.\n\n## Level 3\n- This player realises that others could be level-2 and reacts by best responding to the associated expected play.\n- Put differently, he realises that others realise that others best respond to their initial belief.\n- Therefore, a level-3 player clearly states that his opponent expects that he (the level-3 player at question) best-responds to a certain belief.\n\n## Level 4, 5, ...\n- The process goes on in a similar fashion. A level k player realises that other subjects could be level k-1 and reacts by best responding to the associated expected play.\n\n**Important**: There are two necessary conditions for a player to exhibit a level greater than 0. First, the player has to be responsive to the salience of the games' framing. Secondly, the player has to be strategic in best-responding to his level-0 belief, which is shaped by label or payoff salience. If he did not react to salience, he would have no reason to chose one over the other object, resulting in random level 0 play.\n\nA player must show responsiveness to salience or payoffs to be above Level 0.", "s": "- Classify the player's level of strategic thinking as 0, 1, 2, 3, 4 or 5."}, "exp": {"v": "- Subjects are randomly assigned into teams of two players. For a given strategic situation, each player makes suggestions for the team action at two points in time.\n- First, the so-called \"suggested decision\" and a justifying written message are exchanged between the team partners simultaneously.\n- After this, the \"final decision\" is taken individually by each team player. The computer chooses randomly one of the two final decisions to obtain the \"team's action.\"\n- All teams play a series of eight coordination games.\n- Coordination games are characterised by situations in which all parties can realize mutual gains, but only by making mutually consistent decisions.\n- Each team is randomly matched with another team. If a matched pair of teams both decide on identical team actions, they coordinate their behavior successfully and are rewarded with a payoff.\n- However, if both teams choose different team actions, they fail to coordinate their behavior and do not receive any payoff. Thus both teams are motivated solely to coordinate their strategies in order to obtain an outcome that is best for them.\n- The following example illustrates a random coordination game in which each team decides on one strategy X, Y or Z simultaneously. Only if both teams make mutually consistent decisions they receive a payoff of 2 units each.\n- Payoff table (first number is Team 1's payoff, second is Team 2's):\n\n| Team 1 \\ Team 2 | X | Y | Z |\n|---|---|---|---|\n| X | (2,2) | (0,0) | (0,0) |\n| Y | (0,0) | (2,2) | (0,0) |\n| Z | (0,0) | (0,0) | (2,2) |\n\n- The payoff is represented through an experimental currency unit (\"Taler\"). One Taler is worth 0,40 Euro.\n- In a symmetric coordination game each team is rewarded the same payoff if they coordinate their behavior successfully.\n- In asymmetric coordination games players usually disagree on which action they prefer to coordinate. There may be one outcome where one team disproportionately benefits in comparison to the other team.\n- All subjects face a series of eight coordination games composed of four \"X-Y Games\" and four \"Pie Games\".\n\n### X-Y Coordination Games\n- \"X-Y Games\" are characterised by a binary choice option \"X\" or \"Y\". The assignment of payoffs for successful coordination is indicated in brackets. Example:\n  + X [6 Taler for Team 1 and 5 Taler for Team 2]\n  + Y [5 Taler for Team 1 and 6 Taler for Team 2]\n- If a matched pair of teams both decide on the identical team action \"X\", team one receives 6 Taler and team two receives 5 Taler.\n- If both teams chose \"Y\", the assignment of payoffs would be reversed. If both teams chose decisions with different labels \"X\" and \"Y\", neither team receives any payoff. The payoff differences vary within the four \"X-Y treatments\".\n\n### Pie Coordination Games\n- \"Pie Games\" are characterised by a visual representation of different choice options displayed as a pie chart divided into three slices. Each team simultaneously selects one of the three \"pie slices\".\n- The three slices are labeled with abstract decision labels: $ (top-left, shaded gray), # (top-right, shaded gray), and § (bottom, highlighted in white). The bottom slice § is visually distinctive from the two upper slices.\n- The assignment of payoffs for successful coordination is indicated within the three slices. The first number represents the quantity of Taler for team one, the second number the quantity of Taler for team two. Example:\n\n| Decision | Payoffs (Team 1, Team 2) |\n|----------|--------------------------|\n| $ (left) | 6, 7 |\n| # (right)| 7, 6 |\n| § (bottom)| 7, 5 |\n\n- If both teams chose decisions with different labels §, $ or #, neither team receives any payoff. The payoff differences alternate within the four \"Pie treatments\".\n\n### Salience\n- Note that the \"X-Y Game\" and the \"Pie Game\" might both contain one alternative that is visually distinctive from another alternative. For instance, the unshaded bottom slice is visually distinctive from the two upper slices ($ and #) that are shaded in a light grey color. We refer to a visually distinctive alternative as label-salient.\n- Moreover an alternative might be payoff-salient in a way that it is distinctive with respect to its payoff structure. The concept of label and payoff salience is important for the classification process.", "c1": "- Subjects are assigned into teams of two players. Each player makes a \"suggested decision\" and a justifying written message, exchanged simultaneously with their team partner. After this, each player makes a \"final decision\" individually. The computer chooses randomly one of the two final decisions as the \"team's action.\"\n- All teams play a series of eight coordination games. Each team is randomly matched with another team. If both teams decide on identical team actions, they coordinate successfully and are rewarded with a payoff in Taler (1 Taler = 0.40 Euro). If they choose different actions, neither team receives any payoff.\n- In symmetric coordination games both teams receive the same payoff. In asymmetric games one team may disproportionately benefit from a particular coordinated outcome.\n### X-Y Coordination Games\n- \"X-Y Games\" are characterised by a binary choice option \"X\" or \"Y\". The assignment of payoffs for successful coordination varies across four X-Y treatments. Example:\n  + X [6 Taler for Team 1 and 5 Taler for Team 2]\n  + Y [5 Taler for Team 1 and 6 Taler for Team 2]\n- If both teams chose \"Y\", the assignment of payoffs would be reversed. If both teams chose decisions with different labels \"X\" and \"Y\", neither team receives any payoff.\n### Pie Coordination Games\n- \"Pie Games\" are characterised by a visual representation displayed as a pie chart divided into three slices. Each team simultaneously selects one of the three \"pie slices\".\n- The three slices are labeled: $ (top-left, shaded gray), # (top-right, shaded gray), and § (bottom, highlighted in white). The bottom slice § is visually distinctive from the two upper slices.\n- The payoffs for successful coordination vary across four Pie treatments. If both teams chose decisions with different labels §, $ or #, neither team receives any payoff.\n### Salience\n- Some alternatives are visually distinctive from others. We refer to a visually distinctive alternative as label-salient. For instance, the bottom slice § is label-salient.\n- An alternative might also be payoff-salient in a way that it is distinctive with respect to its payoff structure. The concept of label and payoff salience is important for the classification process.", "c2": "- Subjects are assigned into teams of two players. Each player makes a \"suggested decision\" and a justifying written message, exchanged simultaneously with their team partner. After this, each player makes a \"final decision\" individually. The computer chooses randomly one of the two final decisions as the \"team's action.\"\n- All teams play a series of eight coordination games. Each team is randomly matched with another team. If both teams decide on identical team actions, they coordinate successfully and are rewarded with a payoff. If they choose different actions, neither team receives any payoff.\n- The payoff is represented in \"Taler\" (1 Taler = 0.40 Euro). In symmetric coordination games both teams receive the same payoff. In asymmetric games players may disagree on which action they prefer to coordinate.\n- \"X-Y Games\": binary choice \"X\" or \"Y\". Example: X [6 Taler for Team 1, 5 for Team 2], Y [5 for Team 1, 6 for Team 2]. Different labels mean no payoff. Payoff differences vary across four X-Y treatments.\n- \"Pie Games\": three \"pie slices\" labeled §, $ or #. Teams simultaneously select one slice. Different labels mean no payoff. Payoff differences alternate across four Pie treatments.\n- Some alternatives are visually distinctive (label-salient). Some are distinctive with respect to payoff structure (payoff-salient). The concept of label and payoff salience is important for the classification process."}, "theory": {"v": "- The level-k model of bounded rationality assumes that players only think through a certain number (k) of best responses. The model has four main ingredients:\n- Population distribution: This distribution reflects the proportion of types with a certain level k.\n- Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions are random to the game and distributed randomly over the action space. In our case, the action space is A = {{X}, {Y}} or A = {{§}, {$}, {#}}. The model incorporates salience by assuming higher probabilities in the level-0 distribution for actions that are visually distinctive (salient). An action might be salient in terms of payoffs and in terms of labels. In the \"X-Y\" treatments, the level-0 distribution would not assign a uniform probability of 0.5 to each possible action, but p > 0.5 to the salient one and qi < p for the remaining actions. In the \"Pie\" treatments, the level-0 distribution would not assign a uniform probability of 1/3 to each possible action, but p > 1/3 to the salient one and qi < p for the remaining actions.\n- Level-0 belief: In the model, the best responses of players with k > 0 are anchored in what they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0 distribution. For best responding, all that matters is the expected payoff from choosing an action from the action space A = {{X}, {Y}} or A = {{§}, {$}, {#}}. A subject would therefore decide on a particular action, when the probability is highest, that the other team chooses the same action.\n- Population belief: Players do not expect other players to be of the same or a higher level of reasoning. For a level-k player, the population belief is therefore defined on the set of levels strictly below k. It follows that level-0 players have no defined belief, level-1 players have a trivial belief with full probability mass on {0}, level-2 players have a well defined belief on {{0}, {1}}. From level 3 higher order beliefs are relevant as level-3 players have to form a belief about level-2's beliefs.", "c1": "- The level-k model assumes that players only think through a certain number (k) of best responses. The model has four main ingredients:\n- Population distribution: reflects the proportion of types with a certain level k.\n- Level-0 distribution: a level-0 player does not best respond. His actions are random over the action space. The model incorporates salience by assuming higher probabilities for visually distinctive (salient) actions. An action might be salient in terms of payoffs and in terms of labels.\n- Level-0 belief: The best responses of players with k > 0 are anchored in what they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0 distribution. A subject decides on a particular action when the probability is highest that the other team chooses the same action.\n- Population belief: Players do not expect other players to be of the same or a higher level of reasoning. For a level-k player, the population belief is defined on the set of levels strictly below k. Level-0 players have no defined belief, level-1 players believe everyone is level-0, level-2 players have beliefs over {0, 1}. From level 3 higher order beliefs are relevant.", "c2": "- The level-k model: players think through k best responses. Level-0 does not best respond; actions are random over {X, Y} or {§, $, #}.\n- Salient actions (visually distinctive or distinctive payoff) get higher probability in the level-0 distribution.\n- Players with k > 0 anchor best responses on their belief about what level-0 players play.\n- Each level assumes others are of lower levels. Level-1 believes all are level-0. Level-2 has beliefs over {0, 1}. Level-3 must form beliefs about level-2's beliefs.\n- Salience can be in terms of labels or payoffs."}}};
const LABELS = {"v": "v — verbatim", "c1": "c1 — light compression", "c2": "c2 — medium compression", "c3": "c3 — heavy compression", "s": "s — minimal (1-line summary)"};
const TASKS  = {"p2": "Promise (public goods)", "l1": "Level-k I (voting)", "l2": "Level-k II (coordination)"};
const SECTIONS = {cls: "Classification instructions", exp: "Experiment context", theory: "Theory context"};

const tabs = document.getElementById("taskTabs");
Object.entries(TASKS).forEach(([tid, name], i) => {
  const b = document.createElement("button");
  b.className = "tab" + (i === 0 ? " active" : "");
  b.textContent = name; b.dataset.task = tid;
  b.addEventListener("click", () => render(tid));
  tabs.appendChild(b);
});

function render(tid) {
  document.querySelectorAll("#taskTabs .tab").forEach(b => b.classList.toggle("active", b.dataset.task === tid));
  const root = document.getElementById("sectionsRoot");
  root.innerHTML = "";
  Object.entries(DATA[tid]).forEach(([sec, variants]) => {
    const h = document.createElement("h2");
    h.style.cssText = "font-family:'Source Serif 4',Georgia,serif;font-weight:600;margin:20px 0 10px;font-size:1.1em;color:#1a3a5f;";
    h.textContent = SECTIONS[sec];
    root.appendChild(h);
    const row = document.createElement("div");
    row.className = "columns " + (Object.keys(variants).length === 2 ? "two" : "three");
    Object.entries(variants).forEach(([v, txt]) => {
      const panel = document.createElement("div");
      panel.className = "panel";
      panel.innerHTML = `<div class="panel-head"><span class="panel-key">${v}</span><span class="panel-name">${LABELS[v] || v}</span></div><div class="panel-body"></div>`;
      panel.querySelector(".panel-body").textContent = txt;
      row.appendChild(panel);
    });
    root.appendChild(row);
  });
}

render("p2");
</script>
