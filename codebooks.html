<script>
const TASKS = {"p2": {"name": "Promise (public goods)", "desc": "public-goods experiment chat classified as promise or not"}, "l1": {"name": "Level-k I (voting)", "desc": "voting-game team chat classified by strategic reasoning level 0–3"}, "l2": {"name": "Level-k II (coordination)", "desc": "coordination-game team chat classified by strategic reasoning level 0–5"}};
const CODE  = {"p2": "Classification instructions\n\nIn the excel file, you will find a list of messages written by participants in an online experiment on individual and group investments.\n\nThe list consists of many conversations between groups of three participants.\n\nYour task is to evaluate, for each conversation, whether each of the participants stated an intent or a promise to take a particular course of action.\n\nYou will classify a participant’s message in a conversation into one of the two categories:\n\n-   A statement of intent or promise (1)\n\n-   Other (0)\n\nTo evaluate the messages, you need to first understand the experiment. The next page describes the experiment, followed by more detailed instructions for your classification task.\n\nThe experiment\n\nThe following is the experiment’s instructions screen. After reading it, the participants continued to a short quiz (to confirm their understanding) and then to 5 rounds of “the group investment task”.\n\nInstructions\n\nWelcome! You are about to participate in an experiment on individual and group investments. The experiment will take about 20 minutes. In the experiment, you may earn money in addition to your reward. Your bonus payment will be determined by your decisions and the decisions of the other participants. You will be able to chat with the other participants.\n\nThe experiment consists of 5 rounds. In each round, you will be randomly matched with two other participants for a group investment task. Each round, you will be matched with a different group.\n\nAfter completing the 5 rounds, you will be paid your bonus payment according to one randomly selected round, in addition to your fixed reward.\n\nWe now describe the group investment task that you will face in each of the 5 rounds.\n\nThe group investment task\n\nYou and the other group members start with 200 pence (£2).\n\nYou can invest between 0-200 in a group project.\n\nYou can keep any money that you don't invest. We will take the total amount invested by all 3 group members and double it.\n\nThen we will share it out equally.\n\nSo, for every 100 pence invested by anyone, each person in the group will get 66 pence back.\n\nBefore choosing how much to invest, you can chat with your group members. You will have two minutes to make your decision. If you don’t make your decision on time, you will not receive a payoff for that round. After making your decision, you will leave the chat. After the three of you have made your decisions, the round ends and you will see the actions that each member took, and each member’s payment.  \n\nNext\n\nClassification\n\nHere are your specific instructions for how you code the messages.\n\n1) You should code a participant’s message (including his/her entire text in the conversation) as “A statement of intent or promise” if you think at least one of the following conditions is satisfied.\n\na.  The writer indicates in the message he/she would take a certain course of action.\n\nb.  The message gives the other participants reasons to believe or expect that that the writer of the message would take a certain course of action.\n\n2) You should code a message as “other”, if the message does not satisfy any of the above conditions.\n\n3) You should independently code all messages. Do not discuss it with anyone else.\n\n4) Your job is to capture what had been said rather than why it was said or what effect it had. Think of yourself as a “coding machine.”\n\n5) When you complete the coding, go through the entire list of messages a second time to review all your codes and revise them if needed for accuracy. Make sure you code every message.\n\nTo simplify your coding in the excel file, use “1” to indicate “A statement of intent or promise” and “0” to indicate “other”.\n\nFor each conversation (which corresponds to a particular team ID in the file), you need to provide one code for each of the three participants; just replace the x symbol in the “promise i” column in 0 or 1 according to your classification decision for member i in the team.\n\nExamples\n\nLet’s illustrate how promises may look like:\n\nParticipant 1: \"all 200 then?\"\n\nParticipant 2: \"yes\"\n\nThe \"yes\" of Participant 2 is a promise.\n\nParticipant 1: \"Are we all just going to with max?”\n\nParticipant 2: \"agree\"\n\nThe \"agree\" of Participant 2 is a promise.\n\nIt would not include statements such as\n\nParticipant 1: \"I think it's best if we invest 200\" or\n\nParticipant 1: \"let's do 200\" or\n\nParticipant 1: \"I have been doing 200 in the last round\" or\n\nParticipant 1: \"100 sounds good\".\n\nRather than spelling out numbers such as 200, people might refer to \"max\" or \"all in\".\n\n------------------------------------------------------------------------ \n\nIn a particular context, \"let's do it\" may be a promise. For example:\n\nParticipant 1: \"200?\"\n\nParticipant 2: \"let's do it\"\n\nor similarly:\n\nParticipant 1: \"150. player 2 are you in agreement?\"\n\nParticipant 2: \"hi sounds good\" \n\n------------------------------------------------------------------------\n\nIt may include conditional promises (do something if someone else agrees).\n\nFor example, in\n\nParticipant 1: \"happy with 200 if we all agree\"...\n\nParticipant 2: \"cool let's do it\"\n\nParticipant 3: \"Yep.\"\n\nIn this case, all participants 1, 2 and 3 made promises.\n\nBut in\n\nParticipant 1: \"200 each?\"\n\nParticipant 2: \"agree\"\n\nParticipant 3: \"agree\"\n\n  only participants 2 and 3 make a promise, because \"200 each?\" does not make it clear that the first participant *will* do 200 if the others do that as well.\n\n------------------------------------------------------------------------\n\nInitial promises about which people later change their mind do not count: \n\nParticipant 1: \"200\"\n\nParticipant 2: \"agreed\"\n\nParticipant 3: \"I suggest 100\"\n\nParticipant 2: \"I'm happy with either\"\n\nParticipant 2 is not making any promise here.\n\n------------------------------------------------------------------------\n", "l1": " Welcome\n     Thank you for participating in this experiment. In this document you will find instructions\nas to how this experiment works. You will be asked to classify messages that have been collected\nin an experiment on voting games. You as well are in an experiment which allows us to give you\nparticular incentives and makes it easier for us to pay you.\n     To take part in the experiment, we assume that you are familiar with the level-k model\nas it has been introduced by Nagel (1995). However, in order to clarify potential questions of\nterminology, we reproduce the main features of the level-k model. In addition we provide detailed\ninstructions of the original experiment, which explain the voting game and also give you a short\nintroduction to voting games. Please read all information carefully.\n\n\nClassification Task\n\nGeneral Comments\n     Your task is to classify the messages sent by subjects to their team member into their ac-\ncording level of thinking. You will read each comment and classify it according to the guidelines\nbelow. You can enter your assessment into the excel sheet provided to you. The excel sheet will\nhave 6 different columns: The first four columns (which are already provided/filled) will identify\nthe message by indicating the experiment, the part, the subject, the period. The fifth column\nis the classification column that we want you to fill and the sixth column is to indicate your\npersonal comments on your task to further clarify your classification choice if necessary. The\norder of these columns will follow the transcript we will provide you.\n\n     It is very important that you double check whether the first 3 columns are filled correctly,\ni.e. that you enter the data for the correct subject, period, part and experiment. Based upon\nthe guidelines below your task will be to fill up the classification column with an integer between\n0 and 3 (“0” for level-0, “1” for level-1, “2” for level-2 and “3” for level-3) or leave it empty. If\nyou find interesting elements that occur frequently but that have not been picked up by us, feel\nfree to add a new column and mark all messages that contain the element. You can then specify\nto us in an email what exactly this element is.\n\n      For each individual classification, your assessment will be benchmarked against another clas-\nsifier’s assessment. Your personal remuneration is based on the number of matches of the level\nclassification. A match is a classification that is congruent with the classification of another\nindependent classifier. Each match will be remunerated with 0.07 Euro.\n\n    Please read this document and the instructions for the experiment entirely in order to get\nan overview and only then start the classification based on the player’s sent message and action\nproposed. If you have any questions please do not hesitate to contact us.\n\n\n\n\nThe Original Experiment\n     A single experimental session consists of 4 parts and every part consists of 2 periods. In\nevery part, every subject is randomly paired with another one to form a team. Depending on the\ntreatment, every team then is randomly matched with 2 or 5 other teams to form a voting group.\nThen every group will be assigned to a blue or red urn and every team in the group will draw a\nball from their assigned urn. The blue (red) urn contains twice more blue (red) balls then red\n(blue) balls. One treatment variable is the group size, in every experiment, in parts 1 (2) and 3\n(4) the groups will consists of 3 (6) teams and accordingly the urns will contain 3 (6) balls. The\nother treatment variable is the draw mechanism, depending on the session, either for the first\n2 parts or the last 2 parts, the balls will be drawn from the urn without replacement (i.e. any\nball picked will not be placed back to the urn). For the other 2 parts, the balls will be drawn\nwith replacement (i.e. any ball picked will be placed back to the urn before the next draw). In\naddition, we have included classroom experiments to the data set (experiments 7 and 8). In both\nexperiments, the balls are drawn from the urn without replacement. Both experiments have two\nparts where in the first part the group size is 3 while in the second part the group size 6.\n     The goal of every group is to correctly state the color of the urn they are assigned to. Ev-\nery team submits a vote (either red or blue) and if every team in the group votes for red then\nthe group’s decision will be red, otherwise it will be blue. Beyond this brief description of the\nexperimental setup, please read the instruction sheets given to the subjects to have a better\nunderstanding of the situation of subjects 1 .\n\n     How do the messages get produced? Every subject in a team observes the team’s drawn\nball and then makes a decision on the color of the urn. Then, they send a message to their team\nmember explaining why they should vote for the suggested color. Next, the team members receive\nthe suggestions and the message of their teammates, and make their final decision on their own.\nEither of the team member’s decision is equally likely to be chosen as the team’s final voting\ndecision. This experimental methodology is developed to elicit subjects’ reasoning through their\nsent messaged (see Burchardi and Penczynski, 2014). In the classroom experiments (experiments\n7 and 8), subjects were not paired into teams but instead they were asked to elaborate on their\nreasoning for taking the action they have taken.\n\n\nModel\n\nGeneral Model\n     It is assumed that you are familiar with the level-k model as it has been introduced by Nagel\n(1995) or represented by Camerer (2004). In order to clarify potential questions of terminology\nand introduce the main features of the model we quickly reproduce the main features of the model\nin the terminology used in this document. The level-k model of bounded rationality assumes\nthat players only think through a certain number (k) of best responses. The model has four\nmain ingredients:\n\n     Population distribution: This distribution reflects the proportion of types with a certain\nlevel k ∈ N0 = {0, 1, 2, 3, 4, 5, . . .}.\n\n     Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his\nactions are random to the game and distributed randomly over the action space. In our case,\nthe action space is A = {Red, Blue} where Red and Blue represent the voting choice of the\nplayer. Note that, our model does not incorporate salience by assuming higher probabilities in\nthe level-0 distributions for the action that is salient due the signal received (i.e. if a blue ball is\nreceived and the player is playing random, the player, due to the availability of the blue signal,\nwill chose to vote blue)\n\n     Level-0 belief: In the model, the best responses of players with level k > 0 are anchored in\nwhat they believe the level-0 players play. Their level-0 belief might not be consistent with the\nlevel-0 distribution. For best responding, all that matters is the expected payoff from choosing\nan action from the action space A = {Red, Blue}.\n\n     Population belief: Players do not expect other players to be of the same or a higher\nlevel of reasoning. For a level-k player, the population belief is therefore defined on the set of\nlevels strictly below k. It follows that level-0 players have no defined belief, level-1 players have a\ntrivial belief with full probability mass on {0} (i.e. the belief that everyone else is level-0), level-2\nplayers have a well defined belief on {{0}, {1}}. From level 3 higher order beliefs are relevant as\nlevel-3 players have to form a belief about level-2’s beliefs.\n\n\nSpecific Model\n     We consider a game with n players (jurors in the voting context). The game starts by nature\nchoosing a state of the world S in Ω = {Red, Blue} with probability r and 1 − r respectively.\nThe players do not observe the state, but each acquires a private signal s about the realized\nstate of the world. If the true state is Blue, then each player observes an independent (or\ngeometrically dependent2 ) Bernoulli random variable (the private signal) which is blue with\nprobability p and red with probability 1 − p (and conversely for when the true state is Red).\nAfter observing their private signals, players chose an action a (a vote) from the action space\nA = {Red, Blue}. Given the votes of the players, 1 ≤ k∗ ≤ n represents the number of votes\nneeded for Red to be chosen for the aggregate decision. In other words, if k∗ many or more\nplayers vote for Red, then the group decision is Red otherwise it is Blue. The utility of jury j\nwhen she takes action a with certainty given her signal is s and given the state is S is defined\nas uj (σj (s) = a, S). Given any signal s, the utility u : A x Ω 7→ R for jury j is further\ndefined by uj (σj (s) = blue, Blue) = uj (σj (s) = red, Red) = 0, uj (σj (s) = red, Blue) = −q and\nuj (σj (s) = blue, Red) = −(1 − q), where 0 < q < 1.\n    In all our experiments, we used k∗ = n (i.e., the unanimity voting rule), r = 0.5, q = 0.5 and p = . As previously explained treatments vary in the number of players n between 3 and 6.\n\n\n\n\n     Under the experimental set-up, the model provides the prototypical behavior of the subjects\ngiven their level as follows:\n\nn = 3 or n = 6 and with replacement:\n\nWhen the blue ball is observed, optimal strategy for:\n- level-1 player: vote blue\n- level-2 player: vote red\n\nWhen the red ball is observed, optimal strategy for:\n- level-1 player: vote red\n- level-2 player: vote red\n\n\n\nn = 3 and without replacement:\n\nWhen the blue ball is observed, optimal strategy for:\n- level-1 player: vote blue\n- level-2 player: vote red\n\nWhen the red ball is observed, optimal strategy for:\n- level-1 player: vote red\n- level-2 player: vote red or blue\n(Voting red is strictly preferred to voting blue under additional assumption that the level-2 player\nassumes with some small probability \u000f that the other players are level-0\nn = 6 and without replacement:\n\nWhen the blue ball is observed, optimal strategy for:\n- level-1 player: vote blue\n- level-2 player: vote red or blue3\n(Voting blue is strictly preferred to voting blue under additional assumption that the level-2\nplayer assumes with some small probability \u000f that the other players are level-0 and not level-1)\n\nWhen the red ball is observed, optimal strategy for:\n- level-1 player: vote red\n- level-2 player: vote red or blue\n(Voting red is strictly preferred to voting blue under additional assumption that the level-2 player\nassumes with some small probability \u000f that the other players are level-0)\n\n\n\nGuidelines for classification\nGeneral Comments:\n\n   • Subjects do not necessarily describe every step of their thinking; therefore, it may not\n     always be obvious to decide which level they are. In many comments, any indications of a\n     level of thinking may be partial or implicit, you should then indicate the most likely level\n     of reasoning of the player.\n   • If the message indicates to simply refer to a previous message (“same as before/above”),\n     then you can use the previous message’s evaluation to determine the level of the current\n     message. Please indicate this inference with a 1 in the column “Other message inference”.\n\n   • If you are unsure of the level of the message, you should indicate the level you think is\n     more likely.\n   • We have deliberately chosen not to disclose the action taken by the subject. You may\n     still see in their comment which action they chose. We do not want you to base your\n     classification on the action taken as it may be misleading.\n\n\nEmpty classification:\n\n    If no message has been formulated you should leave the classification empty. Also, you\nshould leave the classification empty, if you are not sufficiently certain that any of the types\nbelow is capturing the strategic thinking in the message.\n\n\nLevel-0 Player:\n\nCharacteristics Chooses randomly, without justification or through some justification com-\n    pletely unrelated to the task. Might not have understood the game or shows no interest in\n    the game or in thinking about it.\nExamples ”My favorite color is blue, So I chose blue.”\n    “did not exactly understand this experiment seems to be just depending on luck”\n    “Just a guess”\n\nNote Comments such as “It is obviously blue” or “Play red, trust me!” should not be consid-\n    ered as level-0 thinking as these comments to some extent signal some level of understand-\n    ing/interest of the task. Such comments are likely to be level-1 comments yet without any\n    additional information, you should leave the specific cell empty.\n\n\nLevel-1 Player:\n\nCharacteristics Always follows his own signal. The subject may argue in favor of playing his\n    own signal through some probability argument\nExamples “The probability that the red ball we observe is out of the red urn is twice the\n    probability that it is out of the blue urn”\n    “Our signal is blue. Let’s play blue.”\n\n\n\n\n\nNote The key idea in defining a level-1 player is to identify some thinking process that signals\n    the subject’s interest/understanding of the task and the private signal. Furthermore, it is\n    important that the subject does not offer any argument acknowledging the potential votes\n    of the other teams and how to vote accordingly (i.e. adjusting the strategy given what\n    others are expected to do).\n\n\nLevel-2 Player:\n\nCharacteristics Assume that all other players almost always follow their signal (i.e. she as-\n    sumes almost all the other players are level-1 while an epsilon portion of them are level-0).\n    Player does offer an argument acknowledging the potential votes of the other teams and\n    how to vote accordingly (i.e. a best response given others are most likely playing their sig-\n    nal). In other words, if you identify any comment that indicates that the subject assumes\n    (or considers the case) where the other players in her group play their signal, you should\n    consider the possibility that the subject is a level-2 player.\n\n\nExamples “I have a blue ball. If we have the blue urn, someone else also has a blue ball and\n    as a result our group will chose blue regardless of my vote. If we have the red urn, I am\n    the only one with the blue ball and if I vote blue, we will chose the wrong urn. So I should\n    vote for red.”\n    “In case two teams choose red and one chooses blue, blue will be taken. That means that\n    choosing red has a higher chance of being a good decision.”\n    “I guess this is more about luck because there is no way to know it for sure. I would say\n    blue just because of the higher probability. Also I like turtles Also it is likely that one\n    other team will pick blue and then it is that color anyways”\n    “There is no point for us to take blue I think the chances for us to get the right color are\n    higher if we stick with red” [red ball is observed]\n    “I suggest red because we don’t hurt anyone with this decision If the others go for blue\n    because they have a blue ball, the committee’s decision will be blue regardless of our\n    decision”\n    “[. . . ] we could be the deciding vote for blue if the other two choose red” “Choosing blue\n    isn’t as helpful as choosing red, because: only one blue ball can overturn our whole decision\n    but only a unanimous decision for red can help us the same way”\n\nNote In order to discern the two types, you should look for more than any trivial arguments such\n    as the ones given under level-1. There may be cases where the message starts as a level-1\n    argument and then as the subjects elaborates on her reasoning, she starts considering the\n    strategy of the other teams and justify her decision accordingly (see the third example\n    above). In such cases, this message should be considered as level-2. The acknowledgment\n    of other teams’ voting strategy may not always be obvious or may be worded differently\n    such as “hurting the other’s decision” or “not being helpful” (see the last three examples\n    above)\n\n\nLevel-3 Player:\n\nCharacteristics Assumes that almost all other subjects are level-2 players (partially degenerate\n    beliefs). The reasoning in a level-3 player message will have similarities with a level-1 player\n\n\n     message but it will have additional arguments indicating that she assumes others are level-2\n     players.\nExamples “If everyone else assumes others play their own signal then they will always play red.\n    Since I have the blue ball, it is more likely that we have the blue urn so I will vote blue”\n    “I think it’s all the same rule. Since I have the blue ball, it is more likely that we have the\n    blue urn so I will vote blue”\n\n\nNote As stated above, level-3 players are likely to follow their signal like a level-1 player yet\n    they will argue to do so through a much more intricate argument (unlike a level-1 player\n    merely stating probabilities to argue her action). Level-3 players are rare. Higher levels\n    (level-4 etc.) are assumed to not occur; therefore, you should consider only the first 4 levels\n    of thinking.\n\n\n\n\n\n                                                7\n\f\n", "l2": "Welcome!\nThank you for participating in this experiment. In this section you find instructions as to how\nthis experiment works. To take part in the experiment, we assume that you are familiar with\nthe level-k model as it has been introduced by Nagel (1995) and also with the concept of team\nreasoning as it has been introduced by Schelling (1960). In the experiment, subjects play pure\ncoordination games with symmetric and asymmetric payoffs. We assume that you are familiar\nwith the concept of coordination games as they have been carried out by Crawford, Gneezy and\nRottenstreich (2008).\nHowever, in order to clarify potential questions of terminology, we reproduce the main fea-\ntures of the level-k model and the concept of team reasoning. In addition we provide detailed\nexperimental instructions, which explain the game and also give you a short introduction to\ncoordination games. Please read all information carefully in order to know how the original\nexperiment proceeded.\n\n\nExperimental Setting\nIntroduction\nThis section describes the main features of the experiment. Subjects are randomly assigned\ninto teams of two players. For a given strategic situation, each player makes suggestions for\nthe team action at two points in time. First, the so-called ”suggested decision” and a justifying\nwritten message are exchanged between the team partners simultaneously. After this, the ”final\ndecision” is taken individually by each team player. The computer chooses randomly one of the\ntwo final decisions to obtain the ”team’s action.”\nAll teams play a series of eight coordination games. Coordination games are characterised by\nsituations in which all parties can realize mutual gains, but only by making mutually consistent\ndecisions. Each team is randomly matched with another team. If a matched pair of teams both\ndecide on identical team actions, they coordinate their behavior successfully and are rewarded\nwith a payoff.\nHowever, if both teams choose different team actions, they fail to coordinate their behavior and\ndo not receive any payoff. Thus both teams are motivated solely to coordinate their strategies\nin order to obtain an outcome that is best for them. The following example illustrates a random\ncoordination game in which each team decides on one strategy X, Y or Z simultaneously. Only\nif both teams make mutually consistent decisions they receive a payoff of 2 units each.\n\n\n\f                                                    Team 2\n                                               X      Y     Z\n                                         X    (2,2) (0,0) (0,0)\n                               Team 1    Y    (0,0) (2,2) (0,0)\n                                         Z    (0,0) (0,0) (2,2)\n\nThe payoff is represented through an experimental currency unit (”Taler”). One Taler is worth\n0,40 Euro. In a symmetric coordination game each team is rewarded the same payoff if they\ncoordinate their behavior successfully. In asymmetric coordination games players usually\ndisagree on which action they prefer to coordinate. There may be one outcome where one team\ndisproportionately benefits in comparison to the other team.\n\n\n”X-Y Coordination Games”\nAll subjects face a series of eight coordination games composed of four ”X-Y Games” and four\n”Pie Games”. We reproduce the main features and attributes of those games in the following.\n”X-Y Games” are characterised by a binary choice option ”X” or ”Y”. The assignment of\npayoffs for successful coordination is indicated in brackets. Example:\n\n                        X    [6 Taler for Team 1 and 5 Taler for Team 2]\n                        Y    [5 Taler for Team 1 and 6 Taler for Team 2]\n\nIf a matched pair of teams both decide on the identical team action ”X”, team one receives 6\nTaler and team two receives 5 Taler. If both teams chose ”Y”, the assignment of payoffs would\nbe reversed. If both teams chose decisions with different labels ”X” and ”Y”, neither team\nreceives any payoff. The payoff differences vary within the four ”X-Y treatments”.\n\n\n”Pie Coordination Games”\n”Pie Games” are characterised by a visual representation of different choice options as indi-\ncated in the following figure. Each team simultaneously selects one of the three ”pie slices”.\nEach slice is labeled with an abstract decision label §, $ or #. The assignment of payoffs for suc-\ncessful coordination is indicated in brackets within the three slices. The first number represents\nthe quantity of Taler for team one, the second number the quantity of Taler for team two.\n\n\n\n\nIf a matched pair of teams both decide on the identical team action ”#”, team one receives 7\nTaler and team two receives 6 Taler. If both teams chose decisions with different labels §, $\n\for #, neither team receives any payoff. The payoff differences alternate within the four ”Pie\ntreatments”.\nNote that the ”X-Y Game” and the ”Pie Game” might both contain one alternative that is vi-\nsually distinctive from another alternative. For instance, the unshaded bottom slice is visually\ndistinctive from the two upper slices ($ and #) that are shaded in a light grey color. We refer\nto a visually distinctive alternative as label-salient. Moreover an alternative might be payoff-\nsalient in a way that it is distinctive with respect to its payoff structure. The concept of label\nand payoff salience is important for the classification process.\n\n\nTreatment Overview\nWe conducted six sessions in Mannheim and three sessions Heidelberg. All sessions consist of\nthe same eight treatments (four ”X-Y games” and four ”Pie games”), however the sequence of\ntreatments in Mannheim is different from the sequence of treatments in Heidelberg. The follow-\ning two tables provide a brief overview over the sessions conducted in Mannheim (session 1-3,\nsession 7-9 [rounds 7 and 8 moved to the beginning]) and the sessions conducted in Heidelberg\n(session 4-6). The payoff for successful coordination is indicated in brackets. The first number\nrepresents the quantity of Taler for team one, the second number represents the quantity of Taler\nfor team two, if both teams coordinate their behavior.\n\n\nSessions 1-3 Mannheim:\n\n\n Round 1       X   (5 ; 5.1)    Round 2   $   (5 ; 6)    Round 3   X   (5 ; 6)    Round 4   $       (6 ; 7)\n               Y   (5.1 ; 5)              #   (6 ; 5)              Y   (6 ; 5)              #       (7 ; 6)\n                                          §   (6 ; 5)                                       §       (7 ; 5)\n\n Round 5       X   (5 ; 10)     Round 6   $   (6 ; 6)    Round 7   X   (5 ; 5)    Round 8   $       (5 ; 5)\n               Y   (10 ; 5)               #   (6 ; 6)              Y   (5 ; 5)              #       (5 ; 5)\n                                          §   (5 ; 5)                                       §       (5 ; 5)\n\n\n\nSessions 4-6 Heidelberg:\n\n\n Round 1       X    (5 ; 10)    Round 2   $    (6 ; 7)   Round 3   X    (5 ; 6)   Round 4       $    (6 ; 6)\n               Y    (10 ; 5)              #    (7 ; 6)             Y    (6 ; 5)                 #    (6 ; 6)\n                                          §    (7 ; 5)                                          §    (5 ; 5)\n\n Round 5       X   (5 ; 5,10)   Round 6   $    (5 ; 6)   Round 7   X    (5 ; 5)   Round 8       $    (5 ; 5)\n               Y   (5,10 ; 5)             #    (6 ; 5)             Y    (5 ; 5)                 #    (5 ; 5)\n                                          §    (6 ; 5)                                          §    (5 ; 5)\n\n\n\n\n                                                   48\n\fSessions 7-9 Mannheim:\n\n\n Round 1     X     (5 ; 5)   Round 2     $   (5 ; 5)        Round 3   X   (5 ; 5.1)   Round 4   $   (5 ; 6)\n             Y     (5 ; 5)               #   (5 ; 5)                  Y   (5.1 ; 5)             #   (6 ; 5)\n                                         §   (5 ; 5)                                            §   (6 ; 5)\n\n Round 5     X     (5 ; 6)   Round 6     $   (6 ; 7)        Round 7   X   (5 ; 10)    Round 8   $   (6 ; 6)\n             Y     (6 ; 5)               #   (7 ; 6)                  Y   (10 ; 5)              #   (6 ; 6)\n                                         §   (7 ; 5)                                            §   (5 ; 5)\n\n\n\nClassification Process\nRemember: Each player makes suggestions for the team action at two points in time. First,\nthe so-called ”suggested decision” and a justifying written message are exchanged between the\nteam partners simultaneously. After this, the ”final decision” is taken individually by each team\nplayer. The computer chooses randomly one of the two final decisions to obtain the ”team’s ac-\ntion.” Your task is to classify the written messages into different categories. In the following\nwe will describe the classification process for the analysis of the experiment. Please read the\nclassification instructions carefully.\n\n\nLevel k Model\nNotation of the level k model\nIt is assumed that you are familiar with the level-k model as it has been introduced by Nagel\n(1995) or represented by Camerer (2004). The model here is extended to incorporate salience\nin the level-0 belief according to Bacharach and Stahl (2000). In order to clarify potential\nquestions of terminology and introduce the main features of the model we quickly reproduce\nthe main features of the model in the terminology used in this document. The level-k model\nof bounded rationality assumes that players only think through a certain number (k) of best\nresponses. The model has four main ingredients:\n\n\nPopulation distribution: This distribution reflects the proportion of types with a certain level\nk ∈ N0 = {0, 1, 2, 3, 4, 5, . . .}.\n\n\nLevel-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions\nare random to the game and distributed randomly over the action space. In our case, the action\nspace is A = {{X}, {Y }} or A = {{§}, {$}, {#}}. The model incorporates salience by\nassuming higher probabilities in the level-0 distribution for actions that are visually distinctive\n(salient). An action might be salient in terms of payoffs and in terms of labels. In the ”X-\nY” treatments, the level-0 distribution would not assign a uniform probability of 0.5 to each\npossible action, but p > 0.5 to the salient one and qi < p for the remaining actions. In the\n\n\n\f”Pie” treatments, the level-0 distribution would not assign a uniform probability of 1/3 to each\npossible action, but p > 1/3 to the salient one and qi < p for the remaining actions.\n\n\nLevel-0 belief: In the model, the best responses of players with k > 0 are anchored in what\nthey believe the level-0 players play. Their level-0 belief might not be consistent with the level-0\ndistribution. For best responding, all that matters is the expected payoff from choosing an action\nfrom the action space A = {{X}, {Y }} or A = {{§}, {$}, {#}}. A subject would therefore\ndecide on a particular action, when the probability is highest, that the other team chooses the\nsame action.\n\n\nPopulation belief: Players do not expect other players to be of the same or a higher level of\nreasoning. For a level-k player, the population belief is therefore defined on the set of levels\nstrictly below k. It follows that level-0 players have no defined belief, level-1 players have a\ntrivial belief with full probability mass on {0}, level-2 players have a well defined belief on\n{{0}, {1}}. From level 3 higher order beliefs are relevant as level-3 players have to form a\nbelief about level-2’s beliefs.\n\n\nCharacterisation of the different levels\n\n\nLevel 0 The player does not exhibit any strategic reasoning whatsoever. Different versions\nof this might be randomly chosen or purely guessed actions, misunderstanding of the game\nstructure or other non-strategic ’reasons’ for picking a location, e.g. by taste or salience. It is\nimportant that no best-responding to the other’s play occurs. There could be considerations of\nwhat others might play, but without best responding to it. Examples: “Well, it’s a pure guess”,\n“There are no arguments. Simply choose any.”\n\n\nLevel 1 This player best responds to some belief about the other teams’ action. However, he\ndoes not realise that others will be strategic as well. Example: “They are probably picking X, so\nwe do as well”, “The other team would naturally go for the visual distinctive bottom slice, no?”\n\n\nLevel 2 This player not only shows the basic strategic consideration of playing best response\n(matching/mismatching), but also realises that other players best respond as well according to\nthe belief they entertain. A level-2 player clearly contemplates how the other player might\nbest respond to his frame. The player plays a best response to this hypothesised consideration.\nExample: “The other team may think we are most attracted to the alternative # with the highest\npayoff. In order to coordinate our behavior we should also choose the # slice.”\n\n\nLevel 3 This player realises that others could be level-2 and reacts by best responding to the\nassociated expected play. Put differently, he realises that others realise that others best respond\n\fto their initial belief. Therefore, a level-3 player clearly states that his opponent expects that he\n(the level-3 player at question) best-responds to a certain belief.\n\n\nLevel 4, 5, ... The process goes on in a similar fashion. A level k player realises that other\nsubjects could be level k − 1 and reacts by best responding to the associated expected play.\n\n\n\n\n\nClassification Summary\nIn coordination games both teams are motivated solely to coordinate their strategies in order to\nobtain an outcome that is best for them. For a given strategic situation, each player proposes a\nsuggested decision and writes a justifying written message to the team partner. Your task is to\nclassify the written messages into different categories that are summarized in the following:\n\n\nCategory 1: Lower and upper bound on the level of reasoning\nYour aim is to classify the written messages into the underlying level k ∈ N0 = {0, 1, 2, 3, 4, 5, . . .} of\nreasoning. For a given statement it might not be possible to exactly determine the underlying\nlevel of reasoning. To extract as much information as possible, we ask you to indicate a lower\nand an upper bound on the level of reasoning.\nFor the lower bound on the level of reasoning, you should ask yourself: “What is the minimum\nlevel of reasoning that this statement clearly exhibits?” Once noted, you should be able to say to\nyourself: “It seems impossible that the players’ level of reasoning is below this number!” Here\nwe ask you to be very cautious with the classification, not giving away high levels easily.\nThe upper bounds should give the maximum level of reasoning that could be interpreted into\nthe statement. Therefore, you should ask yourself: “What is the highest level of reasoning that\ncan be underlying this statement?” Once noted, you should be able to say: “Although maybe\nnot clearly communicated, this statement could be an expression of this level. If the player\nreasoned higher than this number, this was not expressed in the statement!” For both lower and\nupper bound, please refer to the characterisation of the different levels.\n\nThere are two necessary conditions for a player to exhibit a level greater than 0. First, the\nplayer has to be responsive to the salience of the games’ framing. Secondly, the player has to be\nstrategic in best-responding to his level-0 belief, which is shaped by label or payoff salience. If\nhe did not react to salience, he would have no reason to chose one over the other object, resulting\nin random level 0 play.\n\nFor this category, the excel-sheet for the classification will feature a drop-down menu where you\ncan choose upper and lower bounds between 0 and 5. If no inference can be made since nothing\nor nothing to the point is written, you can choose not applicable (n/a).\n\n\n\n\n\f\n"};
