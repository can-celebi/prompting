<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Codebook-to-Prompt Pipeline</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; }
h1 { padding: 14px 24px; background: #263238; color: #fff; font-size: 1.2em; }

/* Task tabs (top level) */
.task-tabs { display: flex; background: #37474f; }
.task-tab { flex: 1; padding: 10px; border: none; background: transparent; color: #b0bec5; font-size: 0.95em; cursor: pointer; border-bottom: 3px solid transparent; transition: background 0.15s; }
.task-tab:hover { background: #455a64; color: #fff; }
.task-tab.active { background: #455a64; color: #fff; border-bottom-color: #42a5f5; font-weight: 600; }

/* Step tabs (second level) */
.step-tabs { display: flex; gap: 2px; padding: 6px 16px; background: #eceff1; border-bottom: 1px solid #cfd8dc; flex-wrap: wrap; }
.step-tab { padding: 6px 14px; border: 1px solid #b0bec5; border-bottom: none; background: #fff; cursor: pointer; border-radius: 4px 4px 0 0; font-size: 0.82em; color: #546e7a; transition: background 0.15s; }
.step-tab:hover { background: #e3f2fd; }
.step-tab.active { background: #42a5f5; color: #fff; border-color: #1e88e5; font-weight: 600; }

/* Content area */
.content { padding: 16px 24px; min-height: calc(100vh - 140px); }
.content h2 { font-size: 1.1em; margin-bottom: 12px; color: #263238; }
.content h3 { font-size: 0.95em; margin: 16px 0 8px; color: #37474f; }

/* Text blocks */
.codebook-block { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 12px 16px; margin: 8px 0; font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.82em; line-height: 1.65; white-space: pre-wrap; }
.removed {
    background: #ffebee; border-left: 4px solid #e53935;
    position: relative; cursor: pointer;
    max-height: 44px; overflow: hidden;
    transition: max-height 0.25s ease;
}
.removed::after {
    content: "+ click to expand removed section";
    position: absolute; right: 10px; bottom: 4px;
    font-family: 'Inter', sans-serif; font-size: 0.72em;
    color: #c62828; font-style: italic; font-weight: 500;
    background: linear-gradient(to right, transparent 0%, #ffebee 40%);
    padding: 1px 8px 1px 24px;
}
.removed.expanded { max-height: none; }
.removed.expanded::after { content: "− click to collapse"; }

/* Step 2 diff panes: fixed-height, independently scrollable — no collapse */
.step2-pane {
    max-height: 70vh !important;
    overflow-y: auto !important;
    cursor: default !important;
    /* line structure is provided by <div class="diff-line"> wrappers, so the
       parent must not also interpret \n characters as line breaks */
    white-space: normal !important;
}
.step2-pane::after, .step2-pane.expanded::after { content: none !important; }
.step2-pane .diff-line { margin: 0; line-height: 1.55; }
.step2-pane .diff-blank { height: 8px; }
.removed .strike { text-decoration: line-through; color: #c62828; background: #ffcdd2; }
.kept { background: #e8f5e9; border-left: 4px solid #43a047; }
.section-experiment { background: #e3f2fd; border-left: 4px solid #1e88e5; }
.section-theory { background: #f3e5f5; border-left: 4px solid #8e24aa; }
.section-classification { background: #fff8e1; border-left: 4px solid #f9a825; }
.section-examples { background: #fff3e0; border-left: 4px solid #e65100; }
.summary-v { background: #e8f5e9; border-left: 4px solid #2e7d32; }
.summary-c1 { background: #f1f8e9; border-left: 4px solid #7cb342; }
.summary-c2 { background: #fff3e0; border-left: 4px solid #fb8c00; }
.summary-c3 { background: #fce4ec; border-left: 4px solid #e91e63; }
.summary-c4 { background: #f3e5f5; border-left: 4px solid #8e24aa; }
.summary-c5 { background: #e0f7fa; border-left: 4px solid #00838f; }
.summary-cls-v { background: #fff8e1; border-left: 4px solid #f9a825; }
.summary-cls-s { background: #ede7f6; border-left: 4px solid #5e35b1; }

/* Labels */
.label { display: inline-block; font-size: 0.75em; font-weight: 700; padding: 2px 8px; border-radius: 3px; margin-bottom: 6px; color: #fff; }
.label-removed { background: #e53935; }
.label-kept { background: #43a047; }
.label-experiment { background: #1e88e5; }
.label-theory { background: #8e24aa; }
.label-classification { background: #f9a825; color: #333; }
.label-examples { background: #e65100; }
.label-v { background: #2e7d32; }
.label-c1 { background: #7cb342; }
.selected-badge { display: inline-block; font-size: 0.7em; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: #1565c0; color: #fff; margin-left: 8px; }
.not-selected { opacity: 0.45; }
.not-selected .codebook-block { border-style: dashed; }
.label-c2 { background: #fb8c00; }
.label-c3 { background: #e91e63; }
.label-c4 { background: #8e24aa; }
.label-c5 { background: #00838f; }
.label-cls-v { background: #f9a825; color: #333; }
.label-cls-s { background: #5e35b1; }

/* Stats bar */
.stats { display: flex; gap: 16px; padding: 8px 16px; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; margin: 8px 0; font-size: 0.82em; flex-wrap: wrap; }
.stat { display: flex; align-items: center; gap: 4px; }
.stat-value { font-weight: 700; }

/* Variant header */
.variant-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
.variant-header .label { margin-bottom: 0; }
.variant-stat { font-size: 0.78em; color: #555; }
.variant-stat strong { color: #333; }

/* Similarity bar */
.similarity-bar { display: flex; gap: 0; margin: 12px 0; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0e0; }
.sim-segment { padding: 8px 12px; text-align: center; font-size: 0.78em; font-weight: 600; }
.sim-segment .sim-label { font-size: 0.72em; font-weight: 400; opacity: 0.85; display: block; }
.sim-segment .sim-val { font-size: 1.1em; display: block; margin-top: 2px; }

/* Information tracking table */
.info-table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.82em; }
.info-table th, .info-table td { border: 1px solid #ccc; padding: 6px 10px; text-align: center; }
.info-table th { background: #eceff1; font-weight: 600; color: #37474f; }
.info-table td:first-child { text-align: left; font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.92em; }
.info-table .check { background: #e8f5e9; color: #2e7d32; font-weight: 700; font-size: 1.1em; }
.info-table .cross { background: #ffebee; color: #c62828; font-weight: 700; font-size: 1.1em; }

/* Legend */
.legend { display: flex; gap: 14px; padding: 8px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; font-size: 0.78em; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch { display: inline-block; width: 14px; height: 14px; border-radius: 2px; border: 1px solid #ccc; }

/* Placeholder */
.placeholder { color: #999; font-style: italic; padding: 40px; text-align: center; border: 2px dashed #ccc; border-radius: 8px; margin: 16px 0; }

/* Step 5: Format sub-tabs */
.fmt-tabs { display: flex; gap: 4px; margin: 8px 0 12px 0; }
.fmt-tab { padding: 5px 12px; border: 1px solid #b0bec5; background: #fff; cursor: pointer; border-radius: 3px; font-size: 0.8em; color: #546e7a; transition: background 0.15s; }
.fmt-tab:hover { background: #e3f2fd; }
.fmt-tab.active { background: #42a5f5; color: #fff; border-color: #1e88e5; font-weight: 600; }

/* Step 5: Content level toggle */
.content-level-tabs { display: flex; gap: 4px; margin: 4px 0 12px 0; }
.cl-tab { padding: 5px 14px; border: 1px solid #b0bec5; background: #fff; cursor: pointer; border-radius: 3px; font-size: 0.8em; color: #546e7a; transition: background 0.15s; }
.cl-tab:hover { background: #e3f2fd; }
.cl-tab.active { background: #2e7d32; color: #fff; border-color: #1b5e20; font-weight: 600; }

/* Step 5: Char count bar */
.char-bar { display: flex; gap: 0; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0e0; margin: 8px 0; }
.char-seg { padding: 6px 10px; text-align: center; font-size: 0.78em; font-weight: 600; flex: 1; }
.char-seg .char-label { font-size: 0.72em; font-weight: 400; opacity: 0.85; display: block; }
.char-seg .char-val { font-size: 1.05em; display: block; margin-top: 2px; }

/* Step 5: Experiment variant tables */
.exp-table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.82em; }
.exp-table th, .exp-table td { border: 1px solid #ccc; padding: 5px 8px; }
.exp-table th { background: #eceff1; font-weight: 600; color: #37474f; text-align: center; }
.exp-table td { font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.88em; }
.exp-table td:first-child { text-align: left; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.exp-table tr:nth-child(even) { background: #fafafa; }

/* Step 5: Section dividers */
.step5-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid #e0e0e0; }
.step5-section:first-of-type { margin-top: 12px; padding-top: 0; border-top: none; }

/* Side by side */
.side-by-side { display: flex; gap: 16px; }
.side-by-side > div { flex: 1; min-width: 0; }

/* Not applicable */
.na-note { color: #999; font-style: italic; padding: 12px 16px; border: 1px dashed #ccc; border-radius: 4px; margin: 8px 0; font-size: 0.85em; }

/* Word-level diff highlighting */
.w-kept { background: #c8e6c9; border-radius: 2px; padding: 0 1px; }
.w-removed { background: #ffcdd2; text-decoration: line-through; color: #c62828; border-radius: 2px; padding: 0 1px; }
.w-new { background: #bbdefb; border-radius: 2px; padding: 0 1px; }
.diff-line { margin: 2px 0; line-height: 1.65; }
.diff-blank { height: 10px; }

/* Key term highlighting */
.key-term { background: #fff59d; font-weight: 700; border-radius: 2px; padding: 0 2px; }

/* Expandable diff sections */
.diff-toggle { display: inline-block; margin: 4px 0; padding: 3px 10px; font-size: 0.78em; color: #1565c0; background: #e3f2fd; border: 1px solid #90caf9; border-radius: 3px; cursor: pointer; transition: background 0.15s; }
.diff-toggle:hover { background: #bbdefb; }
.diff-toggle.open { background: #bbdefb; }
.diff-body { display: none; margin: 4px 0 12px 0; }
.diff-body.open { display: block; }
.diff-body .side-by-side { margin: 0; }
.diff-panel-label { font-size: 0.75em; font-weight: 600; margin-bottom: 4px; color: #546e7a; }

/* Section heading for similarity bars */
.sim-section-label { font-size: 0.78em; font-weight: 600; color: #546e7a; margin: 8px 0 2px 0; }
</style>
</head>

each of the messages is:

 \u00b7\tA statement of intent or promise

 \u00b7\tEmpty Talk

            filtered: `The Original Experiment

A single experimental session consists of 4 parts and every part consists of 2 periods. In every part, every subject is randomly paired with another one to form a team. Depending on the treatment, every team then is randomly matched with 2 or 5 other teams to form a voting group. Then every group will be assigned to a blue or red urn and every team in the group will draw a ball from their assigned urn. The blue urn contains twice more blue balls than red balls. The red urn contains twice more red balls than blue balls. One treatment variable is the group size, in every experiment, in parts 1 and 3 the groups will consist of 3 teams and in parts 2 and 4 the groups will consist of 6 teams and accordingly the urns will contain 3 or 6 balls. The other treatment variable is the draw mechanism, depending on the session, either for the first 2 parts or the last 2 parts, the balls will be drawn from the urn without replacement. For the other 2 parts, the balls will be drawn with replacement.

The goal of every group is to correctly state the color of the urn they are assigned to. Every team submits a vote (either red or blue) and if every team in the group votes for red then the group's decision will be red, otherwise it will be blue.

Every subject in a team observes the team's drawn ball and then makes a decision on the color of the urn. Then, they send a message to their team member explaining why they should vote for the suggested color. Next, the team members receive the suggestions and the message of their teammates, and make their final decision on their own. Either of the team member's decision is equally likely to be chosen as the team's final voting decision.


Model

The level-k model of bounded rationality assumes that players only think through a certain number (k) of best responses. The model has four main ingredients:

Population distribution: This distribution reflects the proportion of types with a certain level k \u2208 N0 = {0, 1, 2, 3, 4, 5, ...}.

Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions are random to the game and distributed randomly over the action space. In our case, the action space is A = {Red, Blue} where Red and Blue represent the voting choice of the player. Note that, our model does not incorporate salience by assuming higher probabilities in the level-0 distributions for the action that is salient due the signal received (i.e. if a blue ball is received and the player is playing random, the player, due to the availability of the blue signal, will chose to vote blue)

Level-0 belief: In the model, the best responses of players with level k > 0 are anchored in what they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0 distribution. For best responding, all that matters is the expected payoff from choosing an action from the action space A = {Red, Blue}.

Population belief: Players do not expect other players to be of the same or a higher level of reasoning. For a level-k player, the population belief is therefore defined on the set of levels strictly below k. It follows that level-0 players have no defined belief, level-1 players have a trivial belief with full probability mass on {0} (i.e. the belief that everyone else is level-0), level-2 players have a well defined belief on {{0}, {1}}. From level 3 higher order beliefs are relevant as level-3 players have to form a belief about level-2's beliefs.

We consider a game with n players (jurors in the voting context). The game starts by nature choosing a state of the world S in \u03a9 = {Red, Blue} with probability r and 1 \u2212 r respectively. The players do not observe the state, but each acquires a private signal s about the realized state of the world. If the true state is Blue, then each player observes an independent (or geometrically dependent) Bernoulli random variable (the private signal) which is blue with probability p and red with probability 1 \u2212 p (and conversely for when the true state is Red). After observing their private signals, players chose an action a (a vote) from the action space A = {Red, Blue}. Given the votes of the players, 1 \u2264 k* \u2264 n represents the number of votes needed for Red to be chosen for the aggregate decision. In other words, if k* many or more players vote for Red, then the group decision is Red otherwise it is Blue. The utility of jury j when she takes action a with certainty given her signal is s and given the state is S is defined as uj(\u03c3j(s) = a, S). Given any signal s, the utility u : A x \u03a9 \u2192 R for jury j is further defined by uj(\u03c3j(s) = blue, Blue) = uj(\u03c3j(s) = red, Red) = 0, uj(\u03c3j(s) = red, Blue) = \u2212q and uj(\u03c3j(s) = blue, Red) = \u2212(1 \u2212 q), where 0 < q < 1.

In all our experiments, we used k* = n (i.e., the unanimity voting rule), r = 0.5, q = 0.5 and p = 2/3. Treatments vary in the number of players n between 3 and 6.

Under the experimental set-up, the model provides the prototypical behavior of the subjects given their level as follows:

n = 3 or n = 6 and with replacement:
When the blue ball is observed, optimal strategy for:
- level-1 player: vote blue
- level-2 player: vote red
When the red ball is observed, optimal strategy for:
- level-1 player: vote red
- level-2 player: vote red

n = 3 and without replacement:
When the blue ball is observed, optimal strategy for:
- level-1 player: vote blue
- level-2 player: vote red
When the red ball is observed, optimal strategy for:
- level-1 player: vote red
- level-2 player: vote red or blue
(Voting red is strictly preferred to voting blue under additional assumption that the level-2 player assumes with some small probability that the other players are level-0)

n = 6 and without replacement:
When the blue ball is observed, optimal strategy for:
- level-1 player: vote blue
- level-2 player: vote red or blue
(Voting blue is strictly preferred to voting blue under additional assumption that the level-2 player assumes with some small probability that the other players are level-0 and not level-1)
When the red ball is observed, optimal strategy for:
- level-1 player: vote red
- level-2 player: vote red or blue
(Voting red is strictly preferred to voting blue under additional assumption that the level-2 player assumes with some small probability that the other players are level-0)

Subjects do not necessarily describe every step of their thinking; therefore, it may not always be obvious to decide which level they are. In many comments, any indications of a level of thinking may be partial or implicit, you should then indicate the most likely level of reasoning of the player.

Characteristics: Chooses randomly, without justification or through some justification completely unrelated to the task. Might not have understood the game or shows no interest in the game or in thinking about it.

Note: The key idea in defining a level-1 player is to identify some thinking process that signals the subject's interest/understanding of the task and the private signal. Furthermore, it is important that the subject does not offer any argument acknowledging the potential votes of the other teams and how to vote accordingly (i.e. adjusting the strategy given what others are expected to do).

Experimental Setting
Introduction
This section describes the main features of the experiment. Subjects are randomly assigned
into teams of two players. For a given strategic situation, each player makes suggestions for

decide on identical team actions, they coordinate their behavior successfully and are rewarded

Notation of the level k model
It is assumed that you are familiar with the level-k model as it has been introduced by Nagel
(1995) or represented by Camerer (2004). The model here is extended to incorporate salience
in the level-0 belief according to Bacharach and Stahl (2000). In order to clarify potential
questions of terminology and introduce the main features of the model we quickly reproduce
the main features of the model in the terminology used in this document. The level-k model
of bounded rationality assumes that players only think through a certain number (k) of best
responses. The model has four main ingredients:


Population distribution: This distribution reflects the proportion of types with a certain level
k \u2208 N0 = {0, 1, 2, 3, 4, 5, . . .}.


Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions
are random to the game and distributed randomly over the action space. In our case, the action
space is A = {{X}, {Y }} or A = {{\u00a7}, {$}, {#}}. The model incorporates salience by
assuming higher probabilities in the level-0 distribution for actions that are visually distinctive
(salient). An action might be salient in terms of payoffs and in terms of labels. In the "X-
Y" treatments, the level-0 distribution would not assign a uniform probability of 0.5 to each
possible action, but p > 0.5 to the salient one and qi < p for the remaining actions. In the


"Pie" treatments, the level-0 distribution would not assign a uniform probability of 1/3 to each
possible action, but p > 1/3 to the salient one and qi < p for the remaining actions.


Level-0 belief: In the model, the best responses of players with k > 0 are anchored in what
they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0
distribution. For best responding, all that matters is the expected payoff from choosing an action
from the action space A = {{X}, {Y }} or A = {{\u00a7}, {$}, {#}}. A subject would therefore
decide on a particular action, when the probability is highest, that the other team chooses the
same action.


Population belief: Players do not expect other players to be of the same or a higher level of
reasoning. For a level-k player, the population belief is therefore defined on the set of levels
strictly below k. It follows that level-0 players have no defined belief, level-1 players have a
trivial belief with full probability mass on {0}, level-2 players have a well defined belief on
{{0}, {1}}. From level 3 higher order beliefs are relevant as level-3 players have to form a
belief about level-2's beliefs.


Characterisation of the different levels


Level 0 The player does not exhibit any strategic reasoning whatsoever. Different versions
of this might be randomly chosen or purely guessed actions, misunderstanding of the game
structure or other non-strategic 'reasons' for picking a location, e.g. by taste or salience. It is

we do as well", "The other team would naturally go for the visual distinctive bottom slice, no?"

(matching/mismatching), but also realises that other players best respond as well according to

subjects could be level k \u2212 1 and reacts by best responding to the associated expected play.

In coordination games both teams are motivated solely to coordinate their strategies in order to
obtain an outcome that is best for them. For a given strategic situation, each player proposes a
suggested decision and writes a justifying written message to the team partner. Your task is to

The upper bounds should give the maximum level of reasoning that could be interpreted into

can be underlying this statement?" Once noted, you should be able to say: "Although maybe
not clearly communicated, this statement could be an expression of this level. If the player
reasoned higher than this number, this was not expressed in the statement!" For both lower and
upper bound, please refer to the characterisation of the different levels.

There are two necessary conditions for a player to exhibit a level greater than 0. First, the

in the level-0 belief according to Bacharach and Stahl (2000). In order to clarify potential
questions of terminology and introduce the main features of the model we quickly reproduce

responses. The model has four main ingredients:

space is A = {{X}, {Y }} or A = {{\u00a7}, {$}, {#}}. The model incorporates salience by

from the action space A = {{X}, {Y }} or A = {{\u00a7}, {$}, {#}}. A subject would therefore

reasoning. For a level-k player, the population belief is therefore defined on the set of levels

All teams play a series of eight coordination games. Coordination games are characterised by situations in which all parties can realize mutual gains, but only by making mutually consistent decisions. Each team is randomly matched with another team. If a matched pair of teams both decide on identical team actions, they coordinate their behavior successfully and are rewarded with a payoff.

                               Team 1    Y    (0,0) (2,2) (0,0)
                                         Z    (0,0) (0,0) (2,2)

// ===== LCS DIFF ENGINE =====

function tokenize(text) {
    return text.split(/\s+/).filter(w => w.length > 0);
}

function tokenizeWithLines(text) {
    const lines = text.split('\n');
    const result = [];
    let idx = 0;
    for (const line of lines) {
        const words = line.split(/\s+/).filter(w => w.length > 0);
        result.push({ line: line, words: words, startIdx: idx });
        idx += words.length;
    }
    return result;
}

// Normalize token for comparison: lowercase + strip all non-alphanumeric.
// So "game.", "game", "**game**", "(game)" all compare equal.
function normTok(w) {
    return w.toLowerCase().replace(/[^a-z0-9]/g, '');
}

function computeLCS(a, b) {
    if (!a || !b || a.length === 0 || b.length === 0) {
        return { lcsLen: 0, inLCS_A: new Set(), inLCS_B: new Set() };
    }
    const m = a.length, n = b.length;
    const aN = a.map(normTok);
    const bN = b.map(normTok);
    const dp = [];
    for (let i = 0; i <= m; i++) {
        dp[i] = new Uint16Array(n + 1);
    }
    for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
            // Only count real word matches (skip pure-punctuation tokens here — handled below).
            if (aN[i-1].length > 0 && aN[i-1] === bN[j-1]) {
                dp[i][j] = dp[i-1][j-1] + 1;
            } else {
                dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
            }
        }
    }
    const inLCS_A = new Set();
    const inLCS_B = new Set();
    let i = m, j = n;
    while (i > 0 && j > 0) {
        if (aN[i-1].length > 0 && aN[i-1] === bN[j-1]) {
            inLCS_A.add(i-1);
            inLCS_B.add(j-1);
            i--; j--;
        } else if (dp[i-1][j] >= dp[i][j-1]) {
            i--;
        } else {
            j--;
        }
    }
    // Treat pure-punctuation / formatting tokens (##, **, —, |, etc.) as "kept" so
    // formatting differences never render as red/blue noise.
    for (let k = 0; k < m; k++) if (aN[k].length === 0) inLCS_A.add(k);
    for (let k = 0; k < n; k++) if (bN[k].length === 0) inLCS_B.add(k);
    return { lcsLen: dp[m][n], inLCS_A, inLCS_B };
}

// Render word-level diff HTML preserving line structure
function renderWordDiffHTML(text, inLCS, cssInLCS, cssNotInLCS) {
    const lineData = tokenizeWithLines(text);
    let html = '';
    for (const ld of lineData) {
        if (ld.words.length === 0) {
            html += '<div class="diff-blank"></div>\n';
            continue;
        }
        let lineHTML = '';
        for (let w = 0; w < ld.words.length; w++) {
            const flatIdx = ld.startIdx + w;
            const word = esc(ld.words[w]);
            if (inLCS.has(flatIdx)) {
                lineHTML += '<span class="' + cssInLCS + '">' + word + '</span> ';
            } else {
                lineHTML += '<span class="' + cssNotInLCS + '">' + word + '</span> ';
            }
        }
        html += '<div class="diff-line">' + lineHTML + '</div>\n';
    }
    return html;
}

// Normalize a line for exact-match comparison: lowercase, collapse to alphanumeric + spaces.
function normalizeLine(line) {
    return line.toLowerCase().replace(/[^a-z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
}

// PDF-extracted text uses hard wraps + hyphen breaks (e.g. "Ev-\n\nery team"),
// while filtered text is reflowed clean prose. Reconstitute joins wrapped lines
// and de-hyphenates so both sides have comparable line structure.
function isHeadingLine(s) {
    const t = s.trim();
    if (!t) return false;
    if (/^#/.test(t)) return true;                        // markdown heading
    if (/^-{3,}$/.test(t) || /^={3,}$/.test(t)) return true; // rule
    if (/^\d+[.)]\s/.test(t)) return true;                // "1) " or "1. "
    if (/^[a-z]\.\s/.test(t)) return true;                // "a. "
    if (/^[-*]\s/.test(t)) return true;                   // bullet
    if (t.length < 60 && /^[A-Z][A-Z0-9 \-,:]+$/.test(t)) return true; // ALL-CAPS heading
    return false;
}
function endsInSentenceFinal(s) { return /[.!?:;]\s*["'”’]?\s*$/.test(s.trim()); }

// A line should stand alone as its own block (not glued onto the previous line).
// Bullets, numbered/lettered items, markdown headings, horizontal rules, ALL-CAPS labels,
// and short Title Case headings like "The Original Experiment" or "Classification Task".
function isStandaloneLine(line) {
    const t = line.trim();
    if (!t) return false;
    if (/^[-*•·]\s/.test(t)) return true;        // bullet marker
    if (/^#/.test(t)) return true;                // markdown heading
    if (/^-{3,}$/.test(t) || /^={3,}$/.test(t)) return true; // rule
    if (/^\d+[.)]\s/.test(t)) return true;        // "1) " or "1. "
    if (/^[a-z]\.\s/.test(t)) return true;        // "a. "
    if (/^[A-Z][A-Z0-9 \-,:]{2,}$/.test(t) && t.length < 60) return true; // ALL-CAPS label
    // Line ending with ":" — in PDF-extracted codebook text this is almost always a
    // heading/sub-heading introducing what follows (e.g. "n = 3 or n = 6 and with
    // replacement:" or "When the blue ball is observed, optimal strategy for:").
    // Treating as standalone keeps granularity symmetric whether or not the source
    // happened to put a blank line after.
    if (t.length < 120 && /:$/.test(t)) return true;
    // Short Title Case heading: all significant words start with an uppercase letter,
    // no sentence-final punctuation.
    if (t.length < 70 && /^[A-Z][A-Za-z0-9\-\s]*$/.test(t) && !/[.!?;,]$/.test(t)) {
        const small = new Set(['of','the','a','an','and','or','in','on','at','to','for','with','vs','by','as','is','de']);
        const words = t.split(/\s+/);
        if (words.length <= 8) {
            let ok = true;
            for (let i = 0; i < words.length; i++) {
                const w = words[i];
                if (i > 0 && small.has(w.toLowerCase())) continue;
                if (!/^[A-Z0-9]/.test(w)) { ok = false; break; }
            }
            if (ok) return true;
        }
    }
    return false;
}

// Reconstitute the text AND track where each source line landed in the clean version.
// Returns { sourceLines, cleanLines, lineToClean } — lineToClean[srcIdx] is the clean
// line index that source line `srcIdx` contributed to (null for blank-line separators).
// Granularity rules: blank lines break blocks; bullet/heading/numbered lines also break
// (and become their own block) — so a "- level-1 player: vote blue" line never gets
// glued onto a neighboring sentence, and granularity is symmetric on both sides
// regardless of how the source happened to use blank lines.
function reconstituteWithMap(text) {
    const sourceLines = text.split('\n');
    const blocks = [];   // each: { srcIndices: [int], joined: string }
    let cur = null;
    const startBlock = () => { cur = { srcIndices: [], joined: '' }; blocks.push(cur); };
    for (let i = 0; i < sourceLines.length; i++) {
        const raw = sourceLines[i];
        if (raw.trim() === '') { cur = null; continue; }
        const t = raw.trim();
        const standalone = isStandaloneLine(t);
        if (standalone || !cur) startBlock();
        if (cur.joined === '') cur.joined = t;
        else if (/[A-Za-z]-$/.test(cur.joined)) cur.joined = cur.joined.slice(0, -1) + t;
        else cur.joined = cur.joined + ' ' + t;
        cur.srcIndices.push(i);
        // A standalone line never absorbs its successors — next non-blank line starts fresh.
        if (standalone) cur = null;
    }
    // Merge blank-separated PDF-wrap artifact blocks (no blank should split a continuation).
    const merged = [];
    for (const b of blocks) {
        if (merged.length === 0) { merged.push(b); continue; }
        const prev = merged[merged.length - 1];
        const prevStandalone = isStandaloneLine(prev.joined);
        const currStandalone = isStandaloneLine(b.joined);
        if (prevStandalone || currStandalone) { merged.push(b); continue; }
        const endsHyphen = /[A-Za-z]-$/.test(prev.joined);
        const startsLower = /^[a-z]/.test(b.joined);
        const prevEndsSentence = endsInSentenceFinal(prev.joined);
        if (endsHyphen && startsLower) {
            prev.joined = prev.joined.slice(0, -1) + b.joined;
            prev.srcIndices = prev.srcIndices.concat(b.srcIndices);
            continue;
        }
        if (!prevEndsSentence && startsLower) {
            prev.joined = prev.joined + ' ' + b.joined;
            prev.srcIndices = prev.srcIndices.concat(b.srcIndices);
            continue;
        }
        merged.push(b);
    }
    const cleanLines = [];
    const lineToClean = new Array(sourceLines.length).fill(null);
    for (let ci = 0; ci < merged.length; ci++) {
        cleanLines.push(merged[ci].joined);
        for (const si of merged[ci].srcIndices) lineToClean[si] = ci;
    }
    return { sourceLines, cleanLines, lineToClean };
}

// Content-token set: normalized alphanumeric words with length > 2, plus shorter tokens
// that look like numbers. Used for fuzzy line similarity.
function contentTokens(line) {
    const s = new Set();
    for (const t of tokenize(line)) {
        const n = normTok(t);
        if (n.length > 2 || /^[0-9]+$/.test(n)) s.add(n);
    }
    return s;
}
function lineSim(a, b) {
    const A = contentTokens(a), B = contentTokens(b);
    if (A.size === 0 && B.size === 0) return a.trim() === b.trim() ? 1 : 0;
    if (A.size === 0 || B.size === 0) return 0;
    let inter = 0;
    for (const w of A) if (B.has(w)) inter++;
    const jac = inter / (A.size + B.size - inter);
    const cov = inter / Math.min(A.size, B.size);
    // Blend: containment caught even when one side adds/drops extra tokens.
    return 0.5 * jac + 0.5 * cov;
}

// Monotone line-level alignment tolerant of slight edits (symbol substitution,
// punctuation differences, minor rewording). A line is matched if its best
// monotone partner has similarity ≥ threshold; otherwise it's unmatched.
function lineAlign(origLines, filtLines) {
    const THRESHOLD = 0.55;   // similarity at which we consider two lines "the same"
    const MISMATCH  = -0.6;   // penalty for diagonal step below threshold
    const GAP       = 0;      // cost-free gap
    const m = origLines.length, n = filtLines.length;
    const sim = Array.from({length: m}, () => new Array(n).fill(0));
    for (let i = 0; i < m; i++) for (let j = 0; j < n; j++) sim[i][j] = lineSim(origLines[i], filtLines[j]);
    const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
    const back = Array.from({length: m+1}, () => new Array(n+1).fill(null));
    for (let i = 1; i <= m; i++) { dp[i][0] = dp[i-1][0] + GAP; back[i][0] = 'up'; }
    for (let j = 1; j <= n; j++) { dp[0][j] = dp[0][j-1] + GAP; back[0][j] = 'left'; }
    for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
            const s = sim[i-1][j-1];
            const diag = dp[i-1][j-1] + (s >= THRESHOLD ? s : MISMATCH);
            const up   = dp[i-1][j]   + GAP;
            const left = dp[i][j-1]   + GAP;
            if (diag >= up && diag >= left) { dp[i][j] = diag; back[i][j] = 'diag'; }
            else if (up >= left)            { dp[i][j] = up;   back[i][j] = 'up'; }
            else                            { dp[i][j] = left; back[i][j] = 'left'; }
        }
    }
    const matchO = new Map(), matchF = new Map();
    let i = m, j = n;
    while (i > 0 || j > 0) {
        const dir = back[i][j];
        if (dir === 'diag') {
            if (sim[i-1][j-1] >= THRESHOLD) { matchO.set(i-1, j-1); matchF.set(j-1, i-1); }
            i--; j--;
        } else if (dir === 'up') { i--; }
        else                     { j--; }
    }
    return { matchO, matchF };
}

// Step 2 diff: reconstituted flowing prose on both sides (hard wraps joined, only real
// paragraph breaks kept). Matched paragraphs still get word-level coloring so edits
// within a paragraph (dropped parentheticals, reworded phrases) show as red/blue while
// preserved words stay green. Unmatched paragraphs render fully red/blue.
function renderStep2Diff(origText, filtText) {
    const oMap = reconstituteWithMap(origText);
    const fMap = reconstituteWithMap(filtText);
    const { matchO, matchF } = lineAlign(oMap.cleanLines, fMap.cleanLines);

    const renderWordColored = (text, inLCS, cssInLCS, cssNotInLCS) => {
        const words = tokenize(text);
        let out = '';
        for (let w = 0; w < words.length; w++) {
            const cls = inLCS.has(w) ? cssInLCS : cssNotInLCS;
            out += '<span class="' + cls + '">' + esc(words[w]) + '</span> ';
        }
        return out;
    };

    const renderSide = (myMap, partnerMap, myMatch, colorUnmatched, isOrig) => {
        let html = '';
        for (let ci = 0; ci < myMap.cleanLines.length; ci++) {
            const line = myMap.cleanLines[ci];
            let inner;
            if (myMatch.has(ci)) {
                const partnerLine = partnerMap.cleanLines[myMatch.get(ci)];
                const aTokens = isOrig ? tokenize(line) : tokenize(partnerLine);
                const bTokens = isOrig ? tokenize(partnerLine) : tokenize(line);
                const { inLCS_A, inLCS_B } = computeLCS(aTokens, bTokens);
                const mySet = isOrig ? inLCS_A : inLCS_B;
                inner = renderWordColored(line, mySet, 'w-kept', colorUnmatched);
            } else {
                inner = '<span class="' + colorUnmatched + '">' + esc(line) + '</span>';
            }
            html += '<div class="diff-line">' + inner + '</div>\n';
            html += '<div class="diff-blank"></div>\n';
        }
        return html;
    };
    return {
        leftHtml:  renderSide(oMap, fMap, matchO, 'w-removed', true),
        rightHtml: renderSide(fMap, oMap, matchF, 'w-new',     false),
    };
}

// Highlight preserved key terms in already-escaped HTML text
function highlightTerms(html, terms) {
    if (!terms || terms.length === 0) return html;
    const termPattern = terms.map(t => escapeRegex(t)).join('|');
    const termRe = new RegExp('\\b(' + termPattern + ')\\b', 'gi');
    const parts = html.split(/(<[^>]*>)/);
    for (let i = 0; i < parts.length; i++) {
        if (i % 2 === 0 && parts[i].length > 0) {
            parts[i] = parts[i].replace(termRe, '<mark class="key-term">$1</mark>');
        }
    }
    return parts.join('');
}

function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

ther of the team member's decision is equally likely to be chosen as the team's final voting decision.\n\n## Theory\n- The level-k model of bounded rationality assumes that players only think through a certain number (k) of best responses. The model has four main ingredients:\n- Population distribution: This distribution reflects the proportion of types with a certain level k ∈ N0 = {0, 1, 2, 3, 4, 5, ...}.\n- Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions are random to the game and distributed randomly over the action space. In our case, the action space is A = {Red, Blue} where Red and Blue represent the voting choice of the player. Note that, our model does not incorporate salience by assuming higher probabilities in the level-0 distributions for the action that is salient due the signal received (i.e. if a blue ball is received and the player is playing random, the player, due to the availability of the blue signal, will chose to vote blue)\n- Level-0 belief: In the model, the best responses of players with level k > 0 are anchored in what they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0 distribution. For best responding, all that matters is the expected payoff from choosing an action from the action space A = {Red, Blue}.\n- Population belief: Players do not expect other players to be of the same or a higher level of reasoning. For a level-k player, the population belief is therefore defined on the set of levels strictly below k. It follows that level-0 players have no defined belief, level-1 players have a trivial belief with full probability mass on {0} (i.e. the belief that everyone else is level-0), level-2 players have a well defined belief on {{0}, {1}}. From level 3 higher order beliefs are relevant as level-3 players have to form a belief about level-2's beliefs.\n- We consider a game with n players (jurors in the voting context). The game starts by natu t of 6 teams, and accordingly the urns contain 3 or 6 balls.\n- The other treatment variable is the draw mechanism: depending on the session, the balls will be drawn from the urn with or without replacement.\n- The goal of every group is to correctly state the color of the urn they are assigned to. Every team submits a vote (either red or blue) and if every team in the group votes for red then the group's decision will be red, otherwise it will be blue.\n- Every subject in a team observes the team's drawn ball and then makes a decision on the color of the urn. Then, they send a message to their team member explaining why they should vote for the suggested color.\n- The team members receive the suggestions and the message of their teammates, and make their final decision on their own. Either of the team member's decision is equally likely to be chosen as the team's final voting decision.\n\n- The level-k model of bounded rationality assumes that players only think through a certain number (k) of best responses. The model has four main ingredients:\n- Population distribution: This distribution reflects the proportion of types with a certain level k ∈ N0 = {0, 1, 2, 3, 4, 5, ...}.\n- Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions are random to the game and distributed randomly over the action space. In our case, the action space is A = {Red, Blue} where Red and Blue represent the voting choice of the player. Note that, our model does not incorporate salience by assuming higher probabilities in the level-0 distributions for the action that is salient due the signal received (i.e. if a blue ball is received and the player is playing random, the player, due to the availability of the blue signal, will chose to vote blue)\n- Level-0 belief: In the model, the best responses of players with level k > 0 are anchored in what they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0 dist ayers. For a given strategic situation, each player makes suggestions for the team action at two points in time.\n- First, the so-called \"suggested decision\" and a justifying written message are exchanged between the team partners simultaneously.\n- After this, the \"final decision\" is taken individually by each team player. The computer chooses randomly one of the two final decisions to obtain the \"team's action.\"\n- All teams play a series of eight coordination games.\n- Coordination games are characterised by situations in which all parties can realize mutual gains, but only by making mutually consistent decisions.\n- Each team is randomly matched with another team. If a matched pair of teams both decide on identical team actions, they coordinate their behavior successfully and are rewarded with a payoff.\n- However, if both teams choose different team actions, they fail to coordinate their behavior and do not receive any payoff. Thus both teams are motivated solely to coordinate their strategies in order to obtain an outcome that is best for them.\n- The following example illustrates a random coordination game in which each team decides on one strategy X, Y or Z simultaneously. Only if both teams make mutually consistent decisions they receive a payoff of 2 units each.\n- Payoff table (first number is Team 1's payoff, second is Team 2's):\n\n| Team 1 \\ Team 2 | X | Y | Z |\n|---|---|---|---|\n| X | (2,2) | (0,0) | (0,0) |\n| Y | (0,0) | (2,2) | (0,0) |\n| Z | (0,0) | (0,0) | (2,2) |\n\n- The payoff is represented through an experimental currency unit (\"Taler\"). One Taler is worth 0,40 Euro.\n- In a symmetric coordination game each team is rewarded the same payoff if they coordinate their behavior successfully.\n- In asymmetric coordination games players usually disagree on which action they prefer to coordinate. There may be one outcome where one team disproportionately benefits in comparison to the other team.\n- All subjects face a series of eight coordination games composed of four \"X-Y Games\" and four \"Pie Games\".\n\n### X-Y Coordination Games\n- \"X-Y Games\" are characterised by a binary choice option \"X\" or \"Y\". The assignment of payoffs for successful coordination is indicated in brackets. Example:\n  + X [6 Taler for Team 1 and 5 Taler for Team 2]\n  + Y [5 Taler for Team 1 and 6 Taler for Team 2]\n- If a matched pair of teams both decide on the identical team action \"X\", team one receives 6 Taler and team two receives 5 Taler.\n- If both teams chose \"Y\", the assignment of payoffs would be reversed. If both teams chose decisions with different labels \"X\" and \"Y\", neither team receives any payoff. The payoff differences vary within the four \"X-Y treatments\".\n\n### Pie Coordination Games\n- \"Pie Games\" are characterised by a visual representation of different choice options displayed as a pie chart divided into three slices. Each team simultaneously selects one of the three \"pie slices\".\n- The three slices are labeled with abstract decision labels: $ (top-left, shaded gray), # (top-right, shaded gray), and § (bottom, highlighted in white). The bottom slice § is visually distinctive from the two upper slices.\n- The assignment of payoffs for successful coordination is indicated within the three slices. The first number represents the quantity of Taler for team one, the second number the quantity of Taler for team two. Example:\n\n| Decision | Payoffs (Team 1, Team 2) |\n|----------|--------------------------|\n| $ (left) | 6, 7 |\n| # (right)| 7, 6 |\n| § (bottom)| 7, 5 |\n\n- If both teams chose decisions with different labels §, $ or #, neither team receives any payoff. The payoff differences alternate within the four \"Pie treatments\".\n\n### Salience\n- Note that the \"X-Y Game\" and the \"Pie Game\" might both contain one alternative that is visually distinctive from another alternative. For instance, the unshaded bottom slice is visually distinctive from the two upper slices ($ and #) that are shaded in a light grey color. We refer to a visually distinctive alternative as label-salient.\n- Moreover an alternative might be payoff-salient in a way that it is distinctive with respect to its payoff structure. The concept of label and payoff salience is important for the classification process.\n\n## Theory\n- The level-k model of bounded rationality assumes that players only think through a certain number (k) of best responses. The model has four main ingredients:\n- Population distribution: This distribution reflects the proportion of types with a certain level k.\n- Level-0 distribution: By definition, a level-0 player does not best respond. Hence, his actions are random to the game and distributed randomly over the action space. In our case, the action space is A = {{X}, {Y}} or A = {{§}, {$}, {#}}. The model incorporates salience by assuming higher probabilities in the level-0 distribution for actions that are visually distinctive (salient). An action might be salient in terms of payoffs and in terms of labels. In the \"X-Y\" treatments, the level-0 distribution would not assign a uniform probability of 0.5 to each possible action, but p > 0.5 to the salient one and qi < p for the remaining actions. In the \"Pie\" treatments, the level-0 distribution would not assign a uniform probability of 1/3 to each possible action, but p > 1/3 to the salient one and qi < p for the remaining actions.\n- Level-0 belief: In the model, the best responses of players with k > 0 are anchored in what they believe the level-0 players play. Their level-0 belief might not be consistent with the level-0 distribution. For best responding, all that matters is the expected payoff from choosing an action from the action space A = {{X}, {Y}} or A = {{§}, {$}, {#}}. A subject would therefore decide on a particular action, when the probability is highest, that the other team chooses the same action.\n- Population belief: Players do not expect other players to be of the same or a higher level of reasoning. For a level-k player, the population belief is therefore defined on the set of levels strictly below k. It follows that level-0 players have no defined belief, level-1 players have a trivial belief with full probability mass on {0}, level-2 players have a well defined belief on {{0}, {1}}. From level 3 higher order beliefs are relevant as level-3 players have to form a belief about level-2's beliefs.\n\n# Input Format\nYou will receive input in the following format:\n\nTeam: [1 or 2]\nPayoffs if both teams coordinate on the same action (0 if mismatch):\n  [Action] → Team 1 receives [X], Team 2 receives [Y]\n  [Action] → Team 1 receives [X], Team 2 receives [Y]\nDecision: [the action this team chose]\nMessage: [the player's message to their teammate]\n\n# Classification Task\nClassify the participant's level of strategic reasoning using the guidance below.\n\n## Level 0\n- The player does not exhibit any strategic reasoning whatsoever.\n- Different versions of this might be randomly chosen or purely guessed actions, misunderstanding of the game structure or other non-strategic 'reasons' for picking a location, e.g. by taste or salience.\n- It is important that no best-responding to the other's play occurs. There could be considerations of what others might play, but without best responding to it.\n\n## Level 1\n- This player best responds to some belief about the other teams' action.\n- However, he does not realise that others will be strategic as well.\n\n## Level 2\n- This player not only shows the basic strategic consideration of playing best response (matching/mismatching), but also realises that other players best respond as well according to the belief they entertain.\n- A level-2 player clearly contemplates how the other player might best respond to his frame. The player plays a best response to this hypothesised consideration.\n\n## Level 3\n- This player realises that others could be level-2 and reacts by best responding // Render variant blocks with diffs for a given section (experiment or theory)
function renderVariantBlocks(sectionData, terms, sectionLabel, sectionType) {
    // Only display variants actually used in the paper's ablation (V, C1, C2). For
    // tasks whose "C2-level" is internally keyed as 'c3' (p1/p2), render it under
    // the canonical C2 label so the tab has a uniform V/C1/C2 vocabulary across tasks.
    const displayMeta = { v: 'V (verbatim)', c1: 'C1', c2: 'C2' };
    const labelClsMap = { v: 'label-v', c1: 'label-c1', c2: 'label-c2' };
    const blockClsMap = { v: 'summary-v', c1: 'summary-c1', c2: 'summary-c2' };
    const picks = (ABLATION_PICKS[currentTask] || {})[sectionType] || [];
    // Remap internal keys in pick order → canonical display keys v/c1/c2.
    const displayKeys = ['v', 'c1', 'c2'];
    const variantMeta = [];
    for (let i = 0; i < picks.length && i < displayKeys.length; i++) {
        const internalKey = picks[i];
        const dispKey = displayKeys[i];
        if (!sectionData[internalKey]) continue;
        variantMeta.push({
            internalKey,
            dispKey,
            label: displayMeta[dispKey],
            labelCls: labelClsMap[dispKey],
            blockCls: blockClsMap[dispKey],
        });
    }
    if (variantMeta.length === 0) return '';
    const prevLabels = {};
    for (let i = 1; i < variantMeta.length; i++) {
        prevLabels[variantMeta[i].dispKey] = variantMeta[i-1].label;
    }

    let html = '';
    for (let vi = 0; vi < variantMeta.length; vi++) {
        const vr = variantMeta[vi];
        const d = sectionData[vr.internalKey];
        html += '<div>';
        html += '<div class="variant-header">';
        html += '<span class="label ' + vr.labelCls + '">' + vr.label + ' (' + d.compression + '%)</span>';
        html += '<span class="variant-stat"><strong>' + d.words + '</strong> words</span>';
        html += '<span class="variant-stat">cos = <strong>' + d.cosine.toFixed(4) + '</strong></span>';
        html += '</div>';

        let variantHtml = esc(d.text);
        variantHtml = highlightTerms(variantHtml, terms);
        html += '<div class="codebook-block ' + vr.blockCls + '">' + variantHtml + '</div>';

        if (vi > 0) {
            const prevInternalKey = variantMeta[vi - 1].internalKey;
            const prevText = sectionData[prevInternalKey].text;
            const currText = d.text;
            const prevLabel = prevLabels[vr.dispKey];
            const toggleId = diffToggleCounter++;

            html += '<span class="diff-toggle" id="diff-toggle-' + toggleId + '" data-label-closed="Show diff from ' + prevLabel + '" data-label-open="Hide diff from ' + prevLabel + '" onclick="toggleDiff(' + toggleId + ')">Show diff from ' + prevLabel + '</span>';
            html += '<div class="diff-body" id="diff-body-' + toggleId + '">';

            const prevWords = tokenize(prevText);
            const currWords = tokenize(currText);
            const diffResult = computeLCS(prevWords, currWords);

            const leftDiffHtml = renderWordDiffHTML(prevText, diffResult.inLCS_A, 'w-kept', 'w-removed');
            const rightDiffHtml = renderWordDiffHTML(currText, diffResult.inLCS_B, 'w-kept', 'w-new');

            html += '<div class="side-by-side">';
            html += '<div>';
            html += '<div class="diff-panel-label">' + prevLabel + ' (dropped = red strikethrough)</div>';
            html += '<div class="codebook-block" style="background:#fff8f8; border-left:3px solid #e57373;">' + leftDiffHtml + '</div>';
            html += '</div>';
            html += '<div>';
            html += '<div class="diff-panel-label">' + vr.label + ' (shared = green, new = blue)</div>';
            html += '<div class="codebook-block" style="background:#f8fff8; border-left:3px solid #81c784;">' + rightDiffHtml + '</div>';
            html += '</div>';
            html += '</div>';

            html += '<div class="stats" style="font-size:0.78em; margin:4px 0 12px 0;">';
            html += '<div class="stat">LCS: <span class="stat-value">' + diffResult.lcsLen + ' words</span></div>';
            html += '<div class="stat">Dropped: <span class="stat-value">' + (prevWords.length - diffResult.lcsLen) + '</span></div>';
            html += '<div class="stat">New: <span class="stat-value">' + (currWords.length - diffResult.lcsLen) + '</span></div>';
            html += '</div>';

            html += '</div>'; // diff-body
        }
        html += '</div>'; // close selected/not-selected wrapper
    }
    return html;
}

// Render a dynamic similarity metrics bar showing only the variants used in the paper.
function renderSimilarityBar(sectionData, sectionLabel, sectionType) {
    let html = '';
    if (sectionLabel) {
        html += '<div class="sim-section-label">' + esc(sectionLabel) + '</div>';
    }
    html += '<div class="similarity-bar">';

    const segColors = [
        { bg: '#e8f5e9', fg: '#2e7d32' },
        { bg: '#f1f8e9', fg: '#558b2f' },
        { bg: '#fff3e0', fg: '#e65100' },
    ];
    const picks = (ABLATION_PICKS[currentTask] || {})[sectionType] || [];
    const displayLabels = ['V (verbatim)', 'C1', 'C2'];

    for (let i = 0; i < picks.length && i < displayLabels.length; i++) {
        const internalKey = picks[i];
        const d = sectionData[internalKey];
        if (!d) continue;
        const col = segColors[i] || segColors[segColors.length - 1];
        html += '<div class="sim-segment" style="flex:1; background:' + col.bg + '; color:' + col.fg + ';">';
        if (i === 0) {
            html += '<span class="sim-label">' + displayLabels[i] + '</span><span class="sim-val">' + d.words + ' words</span>';
        } else {
            html += '<span class="sim-label">' + displayLabels[i] + ' \u2014 cos ' + d.cosine.toFixed(4) + '</span><span class="sim-val">' + d.words + ' words (' + d.compression + '%)</span>';
        }
        html += '</div>';
    }
    html += '</div>';
    return html;
}

    }

    else if (currentStep === 2) {
        html += '<h3>Step 2: Manual Filtering (word-level diff)</h3>';
        html += '<p style="margin-bottom:8px; font-size:0.85em; color:#666;">Procedural content irrelevant to the LLM is removed. Word-level LCS diff shows exactly which words were cut (red/strikethrough) and kept (green). Right panel shows shared words (green) and any reframed/new words (blue).</p>';

        const { leftHtml, rightHtml } = renderStep2Diff(task.step2.original, task.step2.filtered);
        const origWords = tokenize(task.step2.original);
        const filtWords = tokenize(task.step2.filtered);
        const { lcsLen } = computeLCS(origWords, filtWords);

        html += '<div class="side-by-side">';
        html += '<div>';
        html += '<span class="label label-removed">ORIGINAL (removed = red strikethrough, kept = green)</span>';
        html += '<div class="codebook-block removed step2-pane">' + leftHtml + '</div>';
        html += '</div>';
        html += '<div>';
        html += '<span class="label label-kept">FILTERED (shared = green, reframed = blue)</span>';
        html += '<div class="codebook-block kept step2-pane">' + rightHtml + '</div>';
        html += '</div>';
        html += '</div>';
        const origWc = origWords.length;
        const filtWc = filtWords.length;
        html += '<div class="stats">';
        html += '<div class="stat">Original words: <span class="stat-value">' + origWc + '</span></div>';
        html += '<div class="stat">Filtered words: <span class="stat-value">' + filtWc + '</span></div>';
        html += '<div class="stat">LCS words: <span class="stat-value">' + lcsLen + '</span></div>';
        html += '<div class="stat">Removed: <span class="stat-value">' + (origWc - lcsLen) + ' words (' + Math.round((1 - lcsLen/origWc)*100) + '%)</span></div>';
        html += '<div class="stat">New/reframed: <span class="stat-value">' + (filtWc - lcsLen) + ' words</span></div>';
        html += '</div>';
    }

    else if (currentStep === 3) {
        html += '<h3>Step 3: Separation into Sections</h3>';
        html += '<p style="margin-bottom:8px; font-size:0.85em; color:#666;">The filtered content is separated into functional sections that serve distinct roles in the prompt.</p>';

        html += '<span class="label label-experiment">CONTEXT: EXPERIMENT</span>';
        html += '<div class="codebook-block section-experiment">' + esc(task.step3.experiment) + '</div>';

        if (task.hasTheory) {
            html += '<span class="label label-theory">CONTEXT: THEORY</span>';
            if (task.step3.theory) {
                html += '<div class="codebook-block section-theory">' + esc(task.step3.theory) + '</div>';
            } else {
                html += '<div class="na-note">Not applicable for this task</div>';
            }
        } else {
            html += '<span class="label label-theory">CONTEXT: THEORY</span>';
            html += '<div class="na-note">Not applicable for this task</div>';
        }

        html += '<span class="label label-classification">CLASSIFICATION INSTRUCTIONS</span>';
        html += '<div class="codebook-block section-classification">' + esc(task.step3.classification) + '</div>';

        if (task.hasExamples && task.step3.examples) {
            html += '<span class="label label-examples">EXAMPLES</span>';
            html += '<div class="codebook-block section-examples">' + esc(task.step3.examples) + '</div>';
        }
    }

    else if (currentStep === 4) {
        html += '<h3>Step 4: Summary Variants</h3>';
        html += '<p style="margin-bottom:8px; font-size:0.85em; color:#666;">Each context section is iteratively compressed. V = verbatim bullet points, C1/C2/C3/... = increasingly compressed variants. Cosine similarity is measured against V using text-embedding-3-large. Preserved domain terms are highlighted in <mark class="key-term">yellow bold</mark>. Variants used in the ablation study are marked with a blue badge; others are dimmed.</p>';

        // Determine terms for highlighting
        let expTerms = [];
        let theoryTerms = [];
        if (task.step4.similarity) {
            if (task.step4.similarity.terms) {
                expTerms = task.step4.similarity.terms;
            }
            if (task.step4.similarity.expTerms) {
                expTerms = task.step4.similarity.expTerms;
            }
            if (task.step4.similarity.theoryTerms) {
                theoryTerms = task.step4.similarity.theoryTerms;
            }
        }

        // --- Similarity metrics bar(s) ---
        if (task.step4.experiment) {
            if (task.hasTheory && task.step4.theory) {
                html += renderSimilarityBar(task.step4.experiment, 'Context: Experiment', 'exp');
                html += renderSimilarityBar(task.step4.theory, 'Context: Theory', 'theory');
            } else {
                html += renderSimilarityBar(task.step4.experiment, null, 'exp');
            }
        }

        // --- Experiment context variants ---
        html += '<h3 style="margin-top:20px;">Context: Experiment</h3>';
        if (task.step4.experiment) {
            html += renderVariantBlocks(task.step4.experiment, expTerms, 'Experiment', 'exp');
        }

        // --- Theory context (if applicable) ---
        if (task.hasTheory) {
            html += '<h3 style="margin-top:20px;">Context: Theory</h3>';
            if (task.step4.theory) {
                html += renderVariantBlocks(task.step4.theory, theoryTerms, 'Theory', 'theory');
            } else {
                html += '<div class="na-note">Not applicable for this task</div>';
            }
        }

        // --- Classification variants ---
        if (task.step4.classification) {
            html += '<h3 style="margin-top:20px;">Classification Instructions</h3>';
            html += '<p style="margin-bottom:8px; font-size:0.85em; color:#666;">Two variants: V (verbatim) preserves the full classification guidance; S (simple) reduces it to a minimal instruction.</p>';

            const clsV = task.step4.classification.v;
            const clsS = task.step4.classification.s;

            html += '<div>';
            html += '<div class="variant-header">';
            html += '<span class="label label-cls-v">' + clsV.label + '</span>';
            html += '</div>';
            html += '<div class="codebook-block summary-cls-v">' + esc(clsV.text) + '</div>';
            html += '</div>';

            html += '<div>';
            html += '<div class="variant-header">';
            html += '<span class="label label-cls-s">' + clsS.label + '</span>';
            html += '</div>';
            html += '<div class="codebook-block summary-cls-s">' + esc(clsS.text) + '</div>';
            html += '</div>';
        }

        // --- Information Tracking ---
        if (task.step4.infoTracking) {
            // Only show columns for variants actually used in the paper's ablation.
            const picks = (ABLATION_PICKS[currentTask] || {}).exp || ['v','c1','c2'];
            const displayLabels = ['V', 'C1', 'C2'];
            const cols = picks.slice(0, displayLabels.length);
            html += '<h3 style="margin-top:24px;">Information Tracking</h3>';
            html += '<p style="margin-bottom:8px; font-size:0.85em; color:#666;">Tracks which pieces of information survive each compression level.</p>';
            html += '<table class="info-table">';
            html += '<thead><tr><th style="text-align:left;">Information</th>';
            for (let i = 0; i < cols.length; i++) html += '<th>' + displayLabels[i] + '</th>';
            html += '</tr></thead>';
            html += '<tbody>';
            for (const item of task.step4.infoTracking.items) {
                html += '<tr>';
                html += '<td>' + esc(item.info) + '</td>';
                for (const col of cols) {
                    const present = item[col];
                    const note = item[col + 'note'] || '';
                    if (present) {
                        html += '<td class="check">\u2713' + (note ? ' <span style="font-size:0.75em;font-weight:400;color:#666;">(' + esc(note) + ')</span>' : '') + '</td>';
                    } else {
                        html += '<td class="cross">\u2717</td>';
                    }
                }
                html += '</tr>';
            }
            html += '</tbody></table>';

            const items = task.step4.infoTracking.items;
            const total = items.length;
            html += '<div class="stats">';
            for (let i = 0; i < cols.length; i++) {
                let count = 0;
                for (const item of items) if (item[cols[i]]) count++;
                html += '<div class="stat">' + displayLabels[i] + ': <span class="stat-value">' + count + '/' + total + '</span></div>';
            }
            html += '</div>';
        }
    }

    else if (currentStep === 5) {
        html += '<h3>Step 5: Assembled Prompts</h3>';
        html += '<p style="margin-bottom:8px; font-size:0.85em; color:#666;">Full system prompts assembled from pipeline components. Compare format variants and content levels side by side. Format variants apply to the same content; content levels show verbatim (all sections, detailed) vs minimal (no context, simple classification).</p>';

        // Format description labels
        const fmtDescs = {
            ml: 'ml: # Headers + bullet lists (markdown, baseline)',
            mp: 'mp: Plain titles + prose paragraphs',
            fl: 'fl: No headers + bullet lists',
            pt: 'pt: No headers + prose paragraphs (plain text)'
        };

        // --- Format sub-tabs ---
        html += '<div style="margin-bottom:4px; font-size:0.82em; font-weight:600; color:#37474f;">Format variant:</div>';
        html += '<div class="fmt-tabs">';
        for (const fmt of ['ml', 'mp', 'fl', 'pt']) {
            const active = fmt === step5Format ? ' active' : '';
            html += '<button class="fmt-tab' + active + '" data-fmt="' + fmt + '" onclick="switchFormat(\'' + fmt + '\')">' + fmtDescs[fmt] + '</button>';
        }
        html += '</div>';

        // --- Content level toggle ---
        html += '<div style="margin-bottom:4px; font-size:0.82em; font-weight:600; color:#37474f;">Content level:</div>';
        html += '<div class="content-level-tabs">';
        html += '<button class="cl-tab' + (step5ContentLevel === 'verbatim' ? ' active' : '') + '" data-cl="verbatim" onclick="switchContentLevel(\'verbatim\')">Verbatim (exp_V + theory_V + cls_V)</button>';
        html += '<button class="cl-tab' + (step5ContentLevel === 'minimal' ? ' active' : '') + '" data-cl="minimal" onclick="switchContentLevel(\'minimal\')">Minimal (exp_N + theory_N + cls_S)</button>';
        html += '</div>';

        // --- Character / word count bar across all 4 formats ---
        const fmtColors = [
            { bg: '#e3f2fd', fg: '#1565c0' },
            { bg: '#f3e5f5', fg: '#6a1b9a' },
            { bg: '#fff3e0', fg: '#e65100' },
            { bg: '#fce4ec', fg: '#c62828' }
        ];
        const prompts = STEP5_PROMPTS[step5ContentLevel][currentTask];
        html += '<div class="char-bar">';
        for (let fi = 0; fi < 4; fi++) {
            const fmt = ['ml', 'mp', 'fl', 'pt'][fi];
            const text = prompts[fmt];
            const chars = text.length;
            const words = text.trim().split(/\s+/).filter(function(w){return w.length>0;}).length;
            const col = fmtColors[fi];
            const isCurrent = fmt === step5Format;
            const border = isCurrent ? '; border: 2px solid ' + col.fg : '';
            html += '<div class="char-seg" style="background:' + col.bg + '; color:' + col.fg + border + ';">';
            html += '<span class="char-label">' + fmt.toUpperCase() + '</span>';
            html += '<span class="char-val">' + chars + ' chars / ' + words + ' words</span>';
            html += '</div>';
        }
        html += '</div>';

        // --- Variant ID ---
        const isL = currentTask.startsWith('l');
        let variantId;
        if (step5ContentLevel === 'verbatim') {
            variantId = isL ? 'exp_V.theory_V.cls_V' : 'exp_V.cls_V';
        } else {
            variantId = isL ? 'exp_N.theory_N.cls_S' : 'exp_N.cls_S';
        }
        if (step5Format !== 'ml') variantId += '.fmt_' + step5Format;
        html += '<div class="stats" style="margin-bottom:8px;">';
        html += '<div class="stat">Variant ID: <span class="stat-value" style="font-family:monospace;">' + esc(variantId) + '</span></div>';
        html += '<div class="stat">Task: <span class="stat-value">' + currentTask.toUpperCase() + '</span></div>';
        html += '</div>';

        // --- Prompt text ---
        html += '<div class="codebook-block" style="max-height:600px; overflow-y:auto; border-left:4px solid #42a5f5;">' + esc(prompts[step5Format]) + '</div>';

        // ====================================
        // EXPERIMENT VARIANT TABLES
        // ====================================
        html += '<div class="step5-section">';
        html += '<h3>Experiment Variant Tables</h3>';
        html += '<p style="margin-bottom:12px; font-size:0.85em; color:#666;">Summary of all variant IDs for each experiment. Exp A variants are shown in Step 4. Baselines from Exp A are reused where applicable.</p>';

        // --- Exp B: Format ---
        html += '<h3 style="margin-top:16px;">Exp B: Format Variants</h3>';
        html += '<p style="margin-bottom:6px; font-size:0.82em; color:#666;">3 non-default formats (pt, mp, fl) x 2 content levels (verbatim, minimal) = 6 new variants per task. Baseline ml format is from Exp A.</p>';
        var bVars = STEP5_EXP_VARIANTS.B[currentTask];
        html += '<table class="exp-table">';
        html += '<thead><tr><th>Format</th><th>Content Level</th><th>Variant ID</th></tr></thead><tbody>';
        for (var bi = 0; bi < bVars.length; bi++) {
            var bv = bVars[bi];
            var bFmt = bv.match(/fmt_(\w+)/);
            var bContent = bv.indexOf('cls_S') >= 0 ? 'Minimal' : 'Verbatim';
            html += '<tr><td>' + (bFmt ? bFmt[1].toUpperCase() : 'ML') + '</td><td>' + bContent + '</td><td>' + esc(bv) + '</td></tr>';
        }
        html += '</tbody></table>';

        // --- Exp C: Framing ---
        html += '<h3 style="margin-top:16px;">Exp C: Framing Variants</h3>';
        html += '<p style="margin-bottom:6px; font-size:0.82em; color:#666;">3 framing removals (nogt, norp, none) x 2 content levels = 6 new variants per task. Baseline full framing is from Exp A.</p>';
        var cVars = STEP5_EXP_VARIANTS.C[currentTask];
        html += '<table class="exp-table">';
        html += '<thead><tr><th>Framing</th><th>Content Level</th><th>Variant ID</th></tr></thead><tbody>';
        for (var ci = 0; ci < cVars.length; ci++) {
            var cv = cVars[ci];
            var cFrm = cv.match(/frm_(\w+)/);
            var cFrmLabel = cFrm ? cFrm[1] : 'full';
            var frmDescs = { nogt: 'No General Task', norp: 'No Role Persona', none: 'No GT + No RP' };
            var cContent = cv.indexOf('cls_S') >= 0 ? 'Minimal' : 'Verbatim';
            html += '<tr><td>' + esc(frmDescs[cFrmLabel] || cFrmLabel) + '</td><td>' + cContent + '</td><td>' + esc(cv) + '</td></tr>';
        }
        html += '</tbody></table>';

        // --- Exp D: N-shot ---
        html += '<h3 style="margin-top:16px;">Exp D: N-shot Examples</h3>';
        html += '<p style="margin-bottom:6px; font-size:0.82em; color:#666;">N-shot examples x 2 content levels = 2 new variants per task. Baseline (0-shot) is from Exp A.</p>';
        var dVars = STEP5_EXP_VARIANTS.D[currentTask];
        html += '<table class="exp-table">';
        html += '<thead><tr><th>Shot</th><th>Content Level</th><th>Variant ID</th></tr></thead><tbody>';
        for (var di = 0; di < dVars.length; di++) {
            var dv = dVars[di];
            var dContent = dv.indexOf('cls_S') >= 0 ? 'Minimal' : 'Verbatim';
            html += '<tr><td>N-shot</td><td>' + dContent + '</td><td>' + esc(dv) + '</td></tr>';
        }
        html += '</tbody></table>';

        // --- Exp E: Reasoning ---
        html += '<h3 style="margin-top:16px;">Exp E: Reasoning Variants</h3>';
        html += '<p style="margin-bottom:6px; font-size:0.82em; color:#666;">GPT family: 3 levels (low/med/high) x 2 content = 6 variants. Qwen family: 1 level (on) x 2 content = 2 variants. Maverick excluded.</p>';
        var eData = STEP5_EXP_VARIANTS.E[currentTask];
        html += '<table class="exp-table">';
        html += '<thead><tr><th>Model Family</th><th>Reasoning</th><th>Content Level</th><th>Variant ID</th></tr></thead><tbody>';
        for (var gi = 0; gi < eData.gpt.length; gi++) {
            var gv = eData.gpt[gi];
            var gRea = gv.match(/rea_(\w+)/);
            var gContent = gv.indexOf('cls_S') >= 0 ? 'Minimal' : 'Verbatim';
            html += '<tr><td>GPT</td><td>' + (gRea ? gRea[1] : 'none') + '</td><td>' + gContent + '</td><td>' + esc(gv) + '</td></tr>';
        }
        for (var qi = 0; qi < eData.qwen.length; qi++) {
            var qv = eData.qwen[qi];
            var qRea = qv.match(/rea_(\w+)/);
            var qContent = qv.indexOf('cls_S') >= 0 ? 'Minimal' : 'Verbatim';
            html += '<tr><td>Qwen</td><td>' + (qRea ? qRea[1] : 'none') + '</td><td>' + qContent + '</td><td>' + esc(qv) + '</td></tr>';
        }
        html += '</tbody></table>';

        // --- Summary counts ---
        html += '<div class="stats" style="margin-top:12px;">';
        html += '<div class="stat">Exp B: <span class="stat-value">' + bVars.length + ' new variants</span></div>';
        html += '<div class="stat">Exp C: <span class="stat-value">' + cVars.length + ' new variants</span></div>';
        html += '<div class="stat">Exp D: <span class="stat-value">' + dVars.length + ' new variants</span></div>';
        html += '<div class="stat">Exp E (GPT): <span class="stat-value">' + eData.gpt.length + ' variants</span></div>';
        html += '<div class="stat">Exp E (Qwen): <span class="stat-value">' + eData.qwen.length + ' variants</span></div>';
        html += '</div>';

        html += '</div>'; // step5-section
    }

    el.innerHTML = html;
}

// Initial render
render();

// Delegate click-to-expand for .removed blocks (works after every re-render)
document.addEventListener('click', function (e) {
    const rem = e.target.closest && e.target.closest('.removed');
    if (rem) rem.classList.toggle('expanded');
});
</script>
</body>
</html>
